/>Я тут же натравил на него OpenClaw и попросил сделать для себя скилл. Получилось неплохо: агент сам забирает <code>sitemap.xml</code>, обходит страницы через Playwright, парсит title/H1/мета-теги/хлебные крошки/внутренние ссылки — и строит навигационный отчёт.<br/><br/><i class=\"emoji\"><b>🔍</b></i> <b>Что нашлось за первый день</b><br/><br/>Прогнал несколько клиентских сайтов — и сразу посыпались находки:<br/><br/><i class=\"emoji\"><b>🔸</b></i> У одного проекта в карте сайта XML не было ни одной продуктовой страницы. Тысячи товаров просто невидимы для поисковика.<br/><i class=\"emoji\"><b>🔸</b></i> У другого — баннер на главной вёл на 404. Судя по коду, он там висел годами.<br/><i class=\"emoji\"><b>🔸</b></i> Куча быстрых ссылок в навигации вела на технические страницы.<br/><i class=\"emoji\"><b>🔸</b></i> Страницы без навигации: есть в sitemap, но ни одна другая страница на них не ссылается.<br/><br/>Это то, что стоило бы поймать руками — но руками до этого годами никто не добирался.<br/><br/><blockquote><i class=\"emoji\"><b>🔭</b></i> Натравил на ВкусВилл, там бот нашел незакрытые от индексации страницы результатов поиска. Подумал, что ошибка — нет, реально открыты в robots.txt<br/>Правда я уверен, что так и задумано и это не ошибка, а наверняка открытие такие страниц привело много трафика.</blockquote><br/><br/><i class=\"emoji\"><b>⚙️</b></i> <b>Технические ограничения</b><br/><br/>Скилл требует бинарник Chromium для Playwright, поэтому запускается из Codex, Claude Code, OpenClaw — но не из нативного приложения Claude App.<br/><br/><i class=\"emoji\"><b>🚀</b></i> <b>Главная радость — параллелизм</b><br/><br/>OpenClaw с этим скиллом работает прекрасно. Можно кинуть пять клиентских сайтов, он запустит их аудит в пять агентов и получить пять отчётов. Каждый процесс изолирован в своём кэше, конфликтов нет.<br/><br/>Скилл уже в моём репо: <a href=\"https://github.com/artwist-polyakov/polyakov-claude-skills/tree/main/plugins/crawl4ai-seo/skills/crawl4ai-seo\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">crawl4ai-seo</a><br/><br/><b>Если у меня в подписчиках есть СЕО-спецлиалисты, кидайте правки и предложения</b>, <b>я открыт к пулл-реквестам и доработкам.</b><br/><br/>----<br/><br/><a href=\"https://t.me/countwithsasha\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Поляков считает</a> — AI, код и кейсы"}, {"id": "554", "channel": "countwithsasha", "date": "2026-03-24T17:10:33+00:00", "views": "1.84K", "reactions": "30", "mediaUrl": "https://cdn4.telesco.pe/file/MbIptZkT95slJlVtQmDfeK8GvtGZI8UjrQK-I5BnpRwe0msh9IABlKbhQWdqaBR0LyMlBeYxDoYRtTGTACc74q0-vWwYCiuZYEGCUlek2YDiRP-NxcQqHbVtuRVmVpaSbln7A_HcNSlUANDaOsbmMeHhJHQ628E2hO4HXNwKN4E1l33AONkbuaz5K5QH1JBi0qEj8CJMUYh-NiVTni5JQsgmbpoeGVwGKmEUJS8izSBt8U8F5AX47N7w1A7AD-fQ-2a_QJk3qu3YyU_2I2GD7hpu__0Q5L_3aSjCBuuxIuJgv-F7pYJIPVn8XkY7bruGrtzRbqHWt2ziWN0iqVIiIA.jpg", "text": "<b>5 граблей OpenClaw, на которые я наступил за вас</b><br/><br/>Если ваш агент ведёт себя как на скриншотах — обещает сделать, переспрашивает, зависает и признаётся в тупости — скорее всего дело не в модели, а в конфигурации. Вот что помогло мне.<br/><br/><blockquote><i class=\"emoji\"><b>⚠️</b></i> Мои проблемы чаще всего происходят при исползовании прокси для ротации одноразовых ключей вместо опасного использования своей подписки</blockquote><br/><br/><i class=\"emoji\"><b>🧠</b></i> <b>Reasoning: модель «собирается сделать», но не делает</b><br/><br/>Самая коварная проблема. Модель отвечает текстом, логи чистые — но инструменты не вызывает. <code>stopReason: stop</code> вместо <code>toolUse</code>.<br/><br/>Причина: нет флага <code>reasoning: true</code> в определении модели. Без него OpenClaw не шлёт reasoning-параметры в API.<br/><br/><pre><br/><i class=\"emoji\"><b>❌</b></i> { &quot;id&quot;: &quot;gpt-5.3-codex&quot;, &quot;name&quot;: &quot;GPT-5.3 Codex&quot; }<br/><i class=\"emoji\"><b>✅</b></i> { &quot;id&quot;: &quot;gpt-5.3-codex&quot;, &quot;name&quot;: &quot;GPT-5.3 Codex&quot; , &quot;reasoning&quot;: true }<br/></pre><br/><br/>В <code>agents.defaults</code> ещё нужен уровень: <code>&quot;thinkingDefault&quot;: &quot;high&quot; </code>— но без <code>reasoning: true</code> у вас <code>thinkLevel</code> принудительно переключится на off (см <code>src/agents/model-selection.ts</code>).<br/><br/><i class=\"emoji\"><b>👁</b></i> <b>Работа с изображениями</b><br/><br/>Отправляешь фото — I<code>mage model failed: 401</code>. Модель мультимодальая, но OpenClaw не знает, ищет отдельную модель для работы с изображениями.<br/><br/>Фикс: <code>&quot;input&quot;: [&quot;text&quot;, &quot;image&quot;]</code> в определении модели.<br/><br/><i class=\"emoji\"><b>⏱</b></i> <b>Таймауты</b><br/><br/>Дефолт 600 сек. Для <code>reasoning high</code> — мало. Ставьте <code>&quot;timeoutSeconds&quot;: 900.</code><br/>И тут же попадайте на следующую проблему с блокировкой взаимодействия с ботом, пока он думает.<br/><br/><i class=\"emoji\"><b>🔒</b></i> <b>Блокировки: бот думает и не отвечает</b><br/><br/>OpenClaw обрабатывает сообщения последовательно. Пока агент думает 5–10 минут — входящие копятся. Агент не отвечает на сообщения. <br/><br/>В <code>TOOLS.md</code> прописываем жёсткие правила делегирования. Всё, что больше двух вызовов инструментов: <code>sessions_spawn</code> в Codex workspace.<br/><br/><i class=\"emoji\"><b>🔄</b></i> <b>Фидбек из субагентов: честный костыль</b><br/><br/><code>sessions_spawn</code> не блокирует диалог. Но результат не возвращается автоматически. Без напоминания агент забудет проверить.<br/><br/><code>TOOLS.md</code>: после запуска задачи ставишь cron-напоминание через N минут. Нет результата, перенести на 5 минут. Тогда бот будет проверять результаты по расписанию.<br/><br/>Нативного колбека пока нет. Поэтому без такого костыля, костылем становится сам разработчик.<br/><br/><i class=\"emoji\"><b>🎯</b></i> <b>Почему GPT-5.3 Codex, а не 5.4</b><br/><br/>GPT-5.4 универсальная. Codex заточена под tool use. Если бот 80% времени дёргает инструменты — Codex справляется лучше. И Codex тоже мультимодальный. Короче у меня результьаты на кодексе как будто лучше, бот пытается угадывать действие, даже если оно не было явно указано в задаче<br/><br/>Ещё: <code>maxConcurrentSessions</code> в ACP — дефолт 4. У меня 40. Чтобы не упираться в лимит параллельных кодекс сессий.<br/><br/><i>PS. Если абьюзите как я, то не забывайте ставить Warp от Cloudflare в своем прокси сервере. <br/></i><br/>----<br/><br/><a href=\"https://t.me/countwithsasha\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Поляков считает</a> — AI, код и кейсы"}, {"id": "556", "channel": "countwithsasha", "date": "2026-03-27T05:58:01+00:00", "views": "1.26K", "reactions": "49", "mediaUrl": "https://cdn4.telesco.pe/file/D0s94wkBi0n90K8wPEmhSb7Tb7j82dRTLVOhN4kYW5B2UDcbJqnlVL_QakR2I996BhpMHgDUouALNuLoFfM25h55kg7szotNH7NEArb7K0elucvIfMAXrO7MDKf34nOyPNF2jN-gx-H0MYpCesOC1VF6U-IOwdU_MrNSK0pzAM2wLiOfs-W3gC0ab4KZRTX5AItGkKdpSB62rRqoifDA3dVjP5ae2PcxIbQipVScGrSAcYhP5hAsaCyvPV_PNiDtdRH4SRsbj6YjBy-xTyVo9BNKo47ykdILtWgQo7GugDBOZJInlrgCE4k9TiQkRvA9s9z6zN9SXJXSpntwWcSZBw.jpg", "text": "<b>Яндекс DataLens стал платным — я навайбкодил свой за вечер</b><br/><br/>С 1 марта <a href=\"https://yandex.cloud/ru/docs/datalens/pricing-changes\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Яндекс DataLens требует 990 ₽/мес</a> за каждого пользователя. Одно бесплатное место, остальные — за деньги. У меня есть дашборды расшарены на 10 внешних сотрудников. + 10 000 ₽ в месяц за то, что раньше было бесплатным — перебор.<br/><br/>Поэтому я сел и написал свой дашборд. За вечер.<br/><br/><i class=\"emoji\"><b>🛠️</b></i> <b>Что получилось</b><br/><br/>Красивый UI на Реакте, авторизация через Keycloak с логином через Telegram (потому что было готово, не спрашивайте), пока откопировал запросы дашбордов DataLens через инспектор для одного проекта. Число пользователей не ограничено.<br/><br/>74 файла, 12 000 строк кода, один PR на гитхабе.<br/><br/><i class=\"emoji\"><b>🧪</b></i> <b>Как именно вайбкодил</b><br/><br/>Заодно затестил обновлённый init в Claude Code. Сейчас он в research preview за флагом:<br/><br/><code>CLAUDE_CODE_NEW_INIT=1 claude</code><br/><br/>Старый <code>/init</code> сканировал код и генерировал <code>CLAUDE.md</code>. Новый — сначала задаёт вопросы: какой стек, какие паттерны, что автоматизировать хуками. На выходе не только <code>CLAUDE.md</code>, но и предложения по скиллам и хукам форматирования, линтерам. По факту это упрощенный запуск механики из поста про <a href=\"https://t.me/countwithsasha/392\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">AskUserQuestionTool</a>.<br/><br/>Ещё впервые работал через мокапы — сначала рисуешь интерфейс, потом скармливаешь агенту. OpenAI рекомендовали этот подход <a href=\"https://t.me/countwithsasha/551\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">в своём гайде</a>, и он реально помогает: какие-то свежие идеи генерируются за много много токенов. Но референсы надо присылать.<br/><br/>Ну и teammate mode — параллельная работа через Worktrees. Один агент пилит бэкенд, другой — фронт, конфликтов ноль.<br/><br/><i class=\"emoji\"><b>⏳</b></i> <b>Пять лет назад и сейчас</b><br/><br/>В 2021 году я <a href=\"https://vc.ru/marketing/285226-vau-effekt-dlya-rukovoditelei-ili-delaem-udobnuyu-otchetnost-dlya-biznesa-s-uvedomleniyami-v-telegram\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">писал на vc.ru</a>, как собирал рекламную отчётность: AWS Lambda, DynamoDB, Google Sheets, Python-скрипты для выгрузки из рекламных кабинетов, статичные дашборды в Data Studio. На всё это уходили недели.<br/><br/>И вот я подумал, что следующим шагом надо приделать чат пр ал подхватывать переменные прокси, в результате чего из моего контура запросы не уходят, пришлось лезть в исходники и оказалось, что авторы HF добавили в свой тул хранилища типа Xet включенные по умолчанию, а эта штука не использует httpx и как следствие игнорирует настройки прокси.<br/><br/>Короче чтобы решить эту проблему и из рабочего контура подключиться к проксику надо вырубить Xet переменной HF_HUB_DISABLE_XET, а дальше передать проксики и команду:<br/><pre>HF_HUB_DISABLE_XET=1 &#092;<br/>ALL_PROXY=socks5://192.168.1.21:1080 &#092;<br/>HTTPS_PROXY=socks5://192.168.1.21:1080 &#092;<br/>HTTP_PROXY=socks5://192.168.1.21:1080 &#092;<br/>huggingface-cli upload evilfreelancer/context-1-mxfp4 ./context-1-mxfp4 . --repo-type model</pre><br/>После этого загрузка начала работать."}, {"id": "1611", "channel": "evilfreelancer", "date": "2026-03-28T21:21:04+00:00", "views": "733", "reactions": "4", "mediaUrl": "https://cdn4.telesco.pe/file/qOsCTHSyx-gaFgjxTc7ZEcry3cAIAo8G8U3FNQwwMunHo2qjNffYbatPDlOgij2e24S6RFSQ6zqC1g46YBkASaX6CXj93wEIV_Yby-2zVpL1JQgenaIGISJwKl1mfbhr-Dee098dboRKSm-JvHe8kS5_NQVtGgBdmRmfGvH72hjNc8Ep890vyR-p75ZwB18gX4GiOLuyy9H3vwCgqFT3yNIVGuL4FxCYidcVqqREVeFBW5iqrvFe0gjOF3Jhi8v7ttoXzyjtMZfAFfRMwo6xG6LaVPcnmAH5_JB_TtidQjA1cyeUL-NiAhcO8W5zihlgLRoNIW91l2teszYp7EsZnQ.jpg", "text": "Проблема долговременной памяти чатов Хоть я и считаю себя сторонником памяти агентных систем, даже большой пост на эту тему писал, но работая с чатами в которых есть память истории всех сообщений периодически ловлю себя на мысли, что надо напилить какой-нибудь…"}, {"id": "1612", "channel": "evilfreelancer", "date": "2026-03-28T22:05:40+00:00", "views": "836", "reactions": "34", "text": "<b>Конвертация Chroma Context-1 в MXFP4 для домашней 4090</b><br/><br/>Позавчера Chroma выкатила <a href=\"https://trychroma.com/research/context-1\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">техрепорт</a> по своей модельке <a href=\"https://huggingface.co/chromadb/context-1\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">chromadb/context-1</a>, прочёл я его сегодня и был крайне впечатлен.<br/><br/>Это 20B параметров, MoE-архитектура на базе <a href=\"https://huggingface.co/openai/gpt-oss-20b\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">openai/gpt-oss-20b</a>, модель натренирована на агентный поиск, делает декомпозицию сложных запросов на подзапросы, выполнняет итеративный поиск по корпусу документов, и самое интересное - self-editing context, когда модель сама решает какие из найденных документов оставить, а какие выкинуть чтобы не засорять контекстное окно. На бенчмарках показывает результаты сопоставимые с топовыми LLM при скорости как у gpt-oss-20b.<br/><br/>Естественно, захотелось потрогать руками, но... модель выложена в BF16, а это 39 ГБ только веса, ну а моя 4090 хоть и прокачана до 48 ГБ VRAM, но 39 ГБ чистых весов + KV-кеш + накладные расходы CUDA в неё не влезут, нужно минимум ~45-50 ГБ чтобы хоть что-то сгенерировать с минимальным контекстом, но нужен не минимальный, а хотя бы 30-60к токенов, агенты же.<br/><br/>Что делать? Смотрю на оригинальную gpt-oss-20b от OpenAI, она в формате MXFP4, это <a href=\"https://www.opencompute.org/documents/ocp-microscaling-formats-mx-v1-0-spec-final-pdf\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Microscaling FP4</a>, хитрый 4-битный формат, где каждый вес хранится как E2M1 (2 бита экспонента, 1 бит мантиссы), а группа из 32 весов делит общий 8-битный масштаб (E8M0), нативно поддерживается в vLLM через Marlin-ядра и должно отлично работать на RTX 50xx серии, в таком формате модель занимает ~14 ГБ, на мою 4090 влезает с запасом.<br/><br/>Сформировал спеки для кодового агента в Cursor, говорю мол вот тебе веса модели gpt-oss-20b как референс, вот <a href=\"https://www.opencompute.org/documents/ocp-microscaling-formats-mx-v1-0-spec-final-pdf\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">спецификация</a> по методам сжатия MXFP4, вот веса модели context-1 в BF16 которую надо конвертировать, вот docker-compose.yaml с vLLM 0.18.0 на которой агент должен проверять модель.<br/><br/>Задача написать скрипт конвертации, конвертировать модель, запустить в vLLM, убедиться по HTTP что приходят адекватные ответы.<br/><br/>Агент написал <a href=\"https://huggingface.co/evilfreelancer/context-1-mxfp4/blob/main/convert_mxfp4.py\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">скрипт</a>, который читает safetensors, для MoE-экспертов (gate_up_proj и down_proj) транспонирует веса в layout который ожидает vLLM, квантует и пакует всё в MXFP4, по аналогии с gpt-oss-20b, а слои внимания, роутера и эмбеддингов копируются как есть в BF16. В результате 39 ГБ превращаются в ~14 ГБ.<br/><br/>Запустил на vLLM, всё работает, reasoning что-то там рефлексирует, ответы вроде адекватные, но при тестировании tool calling (function calling) выяснилась забавная штука - модель при вызове инструментов валится с ошибкой:<br/><br/><blockquote>openai_harmony.HarmonyError: Unexpected token 12606 while expecting start token 200006</blockquote><br/><br/>Покопавшись в конфигах gpt-oss-20b обнаружил, что в <a href=\"https://huggingface.co/chromadb/context-1/blob/main/generation_config.json\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">generation_config.json</a> модели отсутствует токен <code>&lt;|call|&gt;</code> (id 200012) в списке eos_token_id, из-за этого модель не останавливает генерацию после вызова tool call и harmony ломается. По сути баг в vLLM, но фикс элементарный, добавить 200012 в eos_token_id в generation_config.json модели, после этого и обычный чат и tool calling заработали как надо.<br/><br/>Создал <a href=\"https://huggingface.co/chromadb/context-1/discussions/3\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">PR</a> с фиксом в трекере оригинальной модели.<br/><br/>Ну а квантованную в MXFP4 версию загрузил на HuggingFace: <a href=\"https://huggingface.co/evilfreelancer/context-1-mxfp4\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">evilfreelancer/context-1-mxfp4</a><br/><br/>PS. Поднял её на домашней видяшке и сделал доступной через мою апишку, пример как заюзать через openai-клиент добавил в комментарии."}, {"id": "60", "channel": "aostrikov_ai_agents", "date": "2026-03-28T08:55:03+00:00", "views": "1.28K", "reactions": "94", "mediaUrl": "https://cdn4.telesco.pe/file/X25HgsSutj8oyic7ezjWhfK4pcz8Btl6R4SC8IUZmbH0oDj_BbYycHE8uEIIu9nhxc6yed4rcuKiWHotGslwirTRrhvkhvygtcCicF-5oRe2xkj4sZXaUMKa4dXnr0izykUFO0YqY1ovV870IhN9SXQzo5k7PLNExmaynnqQEP8F8AqX1oCGCQs-kWBgXHYAMgZeHjyCheBQfpxfpId0QFtnVAW_T3C3HrEZxVYz20ZiWt4XdbVxcXkpuXcnPpQp7PCvwMBtXhHR2y7-fA1_ev0_TzluKcqT41Wd5dqqHNdnxIqagYRS-7LvYCcLhOhJRwfdyapNFCdxLypsZvWMOQ.jpg", "text": "Так, командировка позади, возвращаемся в привычный ритм.<br/><br/>Таки дожал от корки до корки <a href=\"https://github.com/shareAI-lab/learn-claude-code\" target=\"_blank\" rel=\"noopener\">https://github.com/shareAI-lab/learn-claude-code</a>, лучшее руководство на сегодняшний день как строить claude code like ассистентов.<br/><br/>Особый кайф было почитать код и увидеть, что даже сложные со стороны вещи - субагенты, планирование задач, компактизация контекста - делаются через 10-20 строчек кода.<br/><br/>Репо с большим упором на кодинг, пристегивайтесь. Кратенько рассказываю, как идеологически все это пишется.<br/><br/>1. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s01-the-agent-loop.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">The Agent Loop</a> - сердце любого агента. Реализация простая - мы отдаем в LLM system prompt, прошлую историю переписки, tool, их историю использования и ждем результат ответа. Если в ответе LLM захочет дернуть tool - фреймворк вызовет его сам и принесет результаты снова в модель, пока stop_reason &#33;= &quot;tool_use&quot;. Плюс на этом этапе добавили тул <i>bash</i>, для вызова произвольных unix команд, который слишком общий и плохо решает конкретные задачи.<br/><br/>Интересно то, что главный агентский цикл занимает 20 строчек (<a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s01_agent_loop.py#L68\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">вот он</a>), и не сильно изменится на протяжении уроков.<br/><br/>2. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s02-tool-use.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Добавляем тулы</a>. Добавляем <i>read_file</i>, <i>write_file</i>, <i>edit_file</i>. Просто вносим их у глобальную мапу тулов и для каждой добавляем добавляем имя, description и input_schema для передачи аргументов в тул. Плюс для каждого тула пишем обработчик, который реализует логику тула, например для <i>read_file</i> вызываем read_text() на объекте файла.<br/><br/>Также начинают появляться гардрейлы (<a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s02_tool_use.py#L49\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">вот</a>), например мы проверяем чтобы директории в заданиях лежали внутри рабочей директории агента, и появился список опасных команд типа &quot;rm -rf /&quot; которые мы запрещаем вызывать.<br/><br/>3. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s03-todo-write.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Планирование</a>. Даем возможность агенту дробить сложные задачи на список todo-шек, и обращаться к нему через новый тул <i>todo</i>. Сами todo-шки хранятся во внутреннем массиве. Добавляем в системный промт <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s03_todo_write.py#L46\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">инструкцию</a>, что ты можешь агент держать в голове план выполнения задач из нескольких шагов через новый тул. Вишенка на торте - в агентский цикл добавили счетчик итераций, и если <i>todo</i> не вызывается уже три итерации, вставляем в историю сообщений напоминание - обновить список todo. Очень элегантная реализация не самой простой фичи.<br/><br/>4. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s04-subagent.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Сабагенты</a>. Главная хотелка - получить возможность экономить главный контект, отдавая локальные задачи сабагентам. Делается это через новый тул - <i>task</i>, позволяющий <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s04_subagent.py#L58\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">отдать субагенту задачу</a> под ключ. Сабагент начинает с чистой истории сообщений имеет лимит в 30 итераций, и возвращает саммари по задаче. Пока это не подпроцесс, а локальный цикл на 30 итераций.<br/><br/>5. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s05-skill-loading.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Скиллы</a>. Добавляем их в известном формате - в шапке name + description, ниже тело скилла в markdown разметке. Name + description попадают в системный промпт, тело будет подгружено, когда модель решит воспользоваться скиллом, через новый тул <i>load_skill</i>. Плюс добавляем в системный промпт <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s05_skill_loading.py#L111\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">инструкцию</a>: &quot;У тебя есть скиллы А, Б, С. Используй тул <i>load_skill</i> чтобы получить новые знания, перед тем как сталкиваться с незнакомыми заданиями&quot;<br/><br/>6. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s06-context-compact.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Компактизация контекста</a>. Три уровня. 1) постоянная локальная компактизация истории тулов на каждом шаге, заменяющая детали вызовов прошлых тулов (старше, чем три цикла) на их упоминание, то есть вместо длинного контекста тула будет: &quot;[Previous: used {tool_name}]&quot;. 2) <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s06_context_compact.py#L98\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">авто-компактизация</a> - по превышению лимита токенов tokens &gt; 50000, берем всю историю переписки, выгружаем во временную папку, даем модели задачу &quot;компактизируй это&quot; с лимитом токенов, заменяем полную историю на саммари. 3) ручная компактизация - тот же механизм из пункта 2, но по требованию кожаного. Прикольно, как тут навскидку считается кол-во токенов - просто количество символов поделить на 4.<br/><br/>7. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s07-task-system.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Задачи и стурктура зависимостей</a>. Окей, что мы имеем? У нас есть дробление на тудушки (п3), но это просто плоская структура без понимания зависимостей между задачами. Добавляем две вещи - <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s07_task_system.py#L47\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">TaskManager</a>, который умеет работать с задачами и управлять зависимостями и 4 новых тула - <i>task_create</i>, <i>task_update</i>, <i>task_list</i>, <i>task_get</i> - которые его используют. Все, остальное модель сделаем сама. Этот блок становится основой следующих этапов, без него они невозможны.<br/><br/>(to be continued...)"}, {"id": "61", "channel": "aostrikov_ai_agents", "date": "2026-03-29T12:19:22+00:00", "views": "709", "reactions": "30", "mediaUrl": "https://cdn4.telesco.pe/file/BxqHT9fCJ7LQGotfZuHnTZ0iC5B_OhOk_ErJqABAucE3s6Jj-yXQfoxhfTFU-S2wiofesfSjAnnXiznQXnesbmRkhfd6PMxo8y4xqqXVKWIFFOZb8huAAxbXZpzwh4xtW5Anqq55FclaHPNyiB3bY4hgI1ysc4jTK04CbMwTbMmhvdMpBhdT_YUd2bO5P_QlwJBs4f0h9pU_KI2rOufbe6Jno_fSPQWJ-6yYC-zr0caNOryS3RiHYS8N8P2tWstBU9A0fxPv68fymCoWVcQ9asvj_nIvnEsQqrDbQiWyBVczv_D7YkyCkj_fgja-QI20PGdc6slHcs1DLsU_GnIg5Q.jpg", "text": "(...продолжаем)<br/><br/>8. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s08-background-tasks.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Фоновые задачи</a>. Учимся не блокироваться на параллельных долгих командах и выполнять их в соседних потоках. Тут реализация будет сильно зависеть от языка программирования, но базово так: каждую новую команду запускаем в отдельном треде и запоминаем её ID. Плюс заводим отдельную очередь, в которую будут попадать все результаты (просто stdout + stderr) выполнившихся тасочек. В итоге команды выполняются асинхронно и не блокируют основного агента. Вторую очередь вычитываем <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/agents/s08_background_tasks.py#L191\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">на каждой итерации</a> агентского цикла, и кладем результат в messages - единый лог всей истории общения с агентом. На этом шаге появились две новые тулы - <i>background_run</i> и <i>check_background</i>, для запуска и проверки деталей фоновых задач.<br/><br/>Минус тут один - в такой реализации внутрь реального запущенного процесса нам не заглянуть и его логи не грепнуть, мы будем просто ждать пока он не завершится и результат не попадет в очередь.<br/><br/>(начинается реально забористое дерьмо, крепитесь)<br/><br/>9. <a href=\"https://github.com/shareAI-lab/learn-claude-code/blob/main/docs/en/s09-agent-teams.md\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Agent Teams</a>. Сабагенты в п4 очень непостоянные сущности - умирают сразу после выполнения задачи, не имеют ни персоны ни протоколов коммуникации друг с другом. <br/><br/>Теперь агенты - это полноценные агенты, у которых появляется жизненный цикл: spawn -&gt; WORKING -&gt; IDLE -&gt; WORKING -&gt; ... -&gt; SHUTDOWN. Их статусы, роли (dev, tester) и имена живут в config.json, но системных промтов там нет, он почему-то захардкожен в коде и для всех один... <b>WTF?&#33;</b><br/><br/>Воскрешает сабагентов лид команды, который стартует из главного agent loop, c одним и тем же системным промтом, типа &quot;<i>Ты лид, воскреси команду и сделай задачу</i>&quot;. На каждом новом цикле агента без тулов, Карл&#33; Зачем? <b>WTF?&#33;</b><br/><br/>Для инициализации агентов лид будет использовать тул <i>spawn</i>, который запускает каждого агента в отдельном треде. А чтобы узнать прогресс агентов, когда вы будете его пинать, у него есть тул <i>list_teammates</i>. Теперь у нас разделяется набор тулов для лида и членов команды, у копателей этих двух тулов нет.<br/><br/>Но есть косяк - лид не живет в отдельном треде, не следит за выполнением задач сабагентами, постоянно будет возвращать вам управление, а вы будете постоянно его пинать &quot;<i>Ну че? Ну как там?</i>&quot; <b>WTF?&#33;</b>. А логично было бы ему крутиться в цикле (через новый тул <i>sleep</i>) и проверять inbox, пока все саб-агенты не перейдут в idle.<br/><br/>Теперь хорошее - у всех агентов появляется свой inbox - текстовый файл на диске (alice.jsonl, bob.jsonl), откуда они вычитывают задачи, которые другие агенты им закидывают. Плюс две новые тулы - <i>send</i> и <i>read_inbox</i> для отправки и получения задач. Проверяет inbox агент на каждом LLM цикле. То, что агент вычитал из inbox, куда он запихивает? Правильно, в messages - центральный лог сообщений.<br/><br/>Но кто кому сможет писать, все друг другу, да? Ахаха, только лид копателям. Они друг про друга не знают, хотя один dev и другой tester, общение только через лида, нормальное дискавери собратьев отсутствует... <b>WTF?&#33;</b><br/><br/>Видите, как много <b>WTF?&#33;</b> <i class=\"emoji\"><b>🤬</b></i><i class=\"emoji\"><b>🤬</b></i><i class=\"emoji\"><b>🤬</b></i><br/><br/>Ворчу, как будто забыл принять таблетки, но на самом деле понимаю, что все так сильно урезано для упрощения, если все шероховатости починить, и так сложный пример был бы в два раза больше и до конца бы его только самые упоротые ребятки дочитали.<br/><br/>(to be continued...)"}, {"id": "4634", "channel": "tips_ai", "date": "2026-03-23T06:53:59+00:00", "views": "4.7K", "reactions": "98", "fwd_from": "Igor", "mediaUrl": "https://cdn4.telesco.pe/file/vnlr_kJNTzlWicBTUGIL3jYFdDHRipe9VcNfq4-lGjeP960jkL42td_dtjwJzhHWtpf3XQTzVb3ElDqBHq5yfYM4VsYDL7DeTMVRjvj0-CctIrzqFDFpl8Jkh2kuO3iXuxEDhwWusr4NOnF_gVanR8OBtcJgZoI1iL3U8yYJgyUAhH4RL5xm3H1ojBglNv1QRfPzzQCHNvuzFx6ftiMO8Z0diriUAEoSU9Yq5ePVGP33EWot9ok3tcVKsa2ysHsuecYOypTZyjroRvMHQGB9ZrOrO-OEBJAza5S3nB2V5EBgs3EyNX19ek5pwRnbOwR4YOVFs3DQAmJ7m2UqAkF8gg", "text": "В последнее время актуально <tg-emoji emoji-id=\"5472223741708606653\"><i class=\"emoji\"><b>☕️</b></i></tg-emoji><br/><br/>Парень <a href=\"https://x.com/om_patel5/status/2033048283241697695?s=20\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">сделал</a> устройство для выживания, которое работает полностью офлайн и <a href=\"https://scorpiodevices.store/order\" target=\"_blank\" rel=\" ние просмотры, engagement<br/><br/>Каналы можно группировать по тематикам в .env-файле. У меня <a href=\"https://github.com/artwist-polyakov/polyakov-claude-skills/blob/89ba75c820f0574c678b2df2b35695671341d4b4/plugins/telegram-channel-parser/skills/telegram-channel-parser/config/.env.example#L16\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">заполнена подборка AI-каналов</a> (все те что сам читаю). <br/><br/><i class=\"emoji\"><b>📱</b></i> <b>Дайджест как веб-страница</b><br/><br/>Результат собирается в React-артефакт прямо в чате Claude: лента карточек с фильтрами по каналу и периоду. Выглядит как мини-Telegram, только без рекламы и «вступите в чат».<br/><br/>А дальше — второй скилл, паблишер на GitHub Pages. Берёт артефакт и деплоит в гитхаб пейджи. Вот что у меня получилось: <a href=\"https://artwist-polyakov.github.io/graphics_reports/2026/2026-03/ai-digest-week/\" target=\"_blank\" rel=\"noopener\">https://artwist-polyakov.github.io/graphics_reports/2026/2026-03/ai-digest-week/</a><br/><br/><blockquote><i class=\"emoji\"><b>💡</b></i> По сути получился персональный Telegram Reader: агент собирает → Claude рендерит → GitHub Pages хостит → ты читаешь в метро.</blockquote><br/><br/><i class=\"emoji\"><b>⚙️</b></i> <b>Как запустить</b><br/><br/>Скиллы ставятся через маркетплейс Claude Code, но для облачной песочницы Клод нет никаких ограничений на доступ, поэтому я рекоменую ставить через customization &gt;&gt; skills &gt;&gt; upload.<br/><br/>Для паблишера нужен fine-grained GitHub-токен с доступом к репозиторию Pages. Парсер работает вообще без настройки. Опиание конфигурации разместил в соответствующих папках <code>config/README.md</code><br/><br/><i class=\"emoji\"><b>🔗</b></i> <b>Ссылки</b><br/><br/><a href=\"https://github.com/artwist-polyakov/polyakov-claude-skills/tree/main/plugins/telegram-channel-parser/skills/telegram-channel-parser\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Парсер телеграм-каналов</a> — код и документация<br/><a href=\"https://github.com/artwist-polyakov/polyakov-claude-skills/tree/main/plugins/github-pages-publisher/skills/github-pages-publisher\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Паблишер GitHub Pages</a> — деплой артефактов<br/><br/>Все скиллы в репозитории: <a href=\"https://github.com/artwist-polyakov/polyakov-claude-skills\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">polyakov-claude-skills</a><br/><br/>Будут идеи как улучшить — приходите в комментарии или пул-реквесты.<br/><br/>----<br/><br/><a href=\"https://t.me/countwithsasha\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Поляков считает</a> — AI, код и кейсы"}, {"id": "102", "channel": "max_about_ai", "date": "2026-03-27T14:22:50+00:00", "views": "2.86K", "reactions": "53", "text": "<b>Про универсальных AI агентов</b><br/><br/>Последний месяц эксперементирую с <a href=\"https://claude.com/product/cowork\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><u>Claude Cowork</u></a><a href=\"https://claude.com/product/cowork\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">,</a> <a href=\"https://openclaw.ai/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><u>OpenClaw</u></a> и <a href=\"https://manus.im/app\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><u>Manus</u></a><a href=\"https://manus.im/app\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">.</a> Мои краткие выводы:<br/><br/><i class=\"emoji\"><b>0️⃣</b></i> Если у вас FOMO, что все вокруг в 10 раз эффективнее благодаря OpenClaw и другим AI агентам, то можете перестать нервничать - технологии все еще далеки от совершенства. Пока хайпа все еще больше чем пользы. Значит ли это, что не надо их пробовать или использовать? Нет&#33; Потому что уже сейчас можно делегировать отдельные задачи, а в какой-то момент рост станет эскпоненциальным и на нем можно будет хорошо вырастить свою карьеру или бизнес.<br/><br/><i class=\"emoji\"><b>1⃣</b></i> Самый зрелый из протестировнных продуктов - Claude Cowork. Он может управлять Chrome и десктопом. А запускать его на десктопе можно с мобилки при помощи функции Dispatch. У него есть библиотека скиллов, коннекторов и плагинов. Работа организуется в проекты. Я прикрутил его в папку c Obsidian и перевел часть своих заметок в markdown, но большой пользы пока не ощутил - work in progress.<br/><br/><i class=\"emoji\"><b>2⃣</b></i> Если нужна максимальная гибкость, то есть смысл выбирать между OpenClaw и его open-source аналогами (<a href=\"https://github.com/qwibitai/nanoclaw\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><u>NanoClaw</u></a><a href=\"https://github.com/qwibitai/nanoclaw\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">,</a> <a href=\"https://github.com/sipeed/picoclaw\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><u>PicoClaw</u></a><a href=\"https://github.com/sipeed/picoclaw\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">,</a> и тд). <br/><br/>Я не настолько богатый чтобы покупать выделенную MacStudio, но при этом хотел сохранить максимальный контроль, поэтому поставил OpenClaw на локальную виртуалку (<a href=\"https://mac.getutm.app/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><u>UTM</u></a> + Debian). Лайфхак - можно попросить Claude Cowork настроить вам OpenClaw в виртуалке. Он прилично сэкономил мне времени. Хотя Warp, вероятно, был бы еще эффективнее. <br/><br/>Еще к OpenClaw и ее скилам у меня вопросы по безопасности. Особенно актуальные на фоне недавних новостей про supply-chain атаку на библиотеку LiteLLM, когда злоумышленники добавили фишинговый код в open-source библиотеку и отправляли конфиденциальные данные (карточки, пароли,…) себе на сервер.<br/><br/><i class=\"emoji\"><b>3⃣</b></i> В каких случаях может быть полезен именно Manus при наличии альтернатив я так и не понял. Все кредиты из 20 долларовой подписки он сожрал за 5-6 относительно простых запросов. А качество работы оказалось - &quot;ну такое&quot;. Не рекомендую.<br/><br/><i class=\"emoji\"><b>4⃣</b></i> Ок, поставили Claude Cowork или OpenClaw. Что дальше? Вот тут начинается самое интересное. Почти все мои AI use cases уже и так либо закрываются Codex / Antigravity / Warp, либо закрываются extended thinking в ChatGPT, либо все еще не пригодны для автоматизации по тем или иным причинам. Впрочем, возможно, дело во мне и моей низкой степени доверия подобным инструментам.<br/><br/>Если у вас есть интересные сценарии использования универсальных AI агентов - поделитесь, пожалуйста, в комментариях. По ощущениям, сейчас сложность не в том как поставить или настроить AI инструменты, а в том в каких сценариях их использовать. Про свои сценарии я напишу в одном из следующих постов.<br/><br/><a href=\"https://t.me/max_about_ai\" target=\"_blank\">@max_about_ai</a>"}, {"id": "1228", "channel": "kdoronin_blog", "date": "2026-03-22T20:48:32+00:00", "views": "1.91K", "reactions": "25", "mediaUrl": "https://cdn4.telesco.pe/file/sYbyd6DAumF5qHChdI8faBqNVrYp9HfVU7KExK5zCw6Ph6juOpk6hBCirWn2-N7DSsyS9JadKYRCGPFyJ8jnTuePTFiKJEbdPWK_lFOgjg1XS163MRIWy8CYUAU46kyM96koAXdqcbtSk90pT16z0IT_UOLTFgZgiuo-UFjT7p7BIEKNwR9P8CcauX5TeHysraUIllnhDTURu1gFUOPhU6ZDkryh-iKW0e44hmEqcBG7blqaqi5qDUQfiXcz3xqa1buBwQrVGR9Bwg5GL8j0zvURoeJjLe42rtD8DQaBItRYwn7t9oddjrjjwS_iktMTfuyckj7nYqG84YTfzGuFAQ.jpg", "text": "<b>Разница между &quot;Получается лучше&quot; и &quot;Это именно то, что я хотел&quot;.<br/></b><br/>AgentSkillOS <a href=\"https://t.me/kdoronin_blog/1223\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">из прошлого поста</a> немного не дотягивает до проекта, который можно брать в режиме &quot;как есть&quot; и <b>применять в продакшн-задачах</b>.<br/><br/>Этого от него, по большому счёту, не требуется. Всё-таки исследовательский проект, который показывает следующее:<br/><br/><blockquote>Подобранные с помощью LLM заранее, наиболее подходящие Agent Skills, и оркестрация их работы в виде графа – система, позволяющая значительно увеличить качество результата.</blockquote><br/><br/><b>Из </b><a href=\"https://arxiv.org/pdf/2603.02176\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">конкретного исследования</a><b> можно забрать следующие идеи:</b><br/><br/>1. Формирование дерева скиллов и последующий поиск по ним.<br/><br/>2. Формирование <b>нескольких способов организации работы AI-агентов</b> через <b>построение DAG-ов</b>.<br/><br/>3. Визуализация симпатичная.<br/><br/><br/><b>Что имеет смысл добавить поверх, чтобы система стала более пригодной для тех сложных задач, под которые создавалась:</b><br/><br/>1. QA-Gate, который будет проверять, что DAG вернул артефакт, <b>соответствующий всем критериям</b> в исходном промпте.<br/><br/>2. <b>Разбивка на более мелкие задачи</b>, чтобы было проще <b>контролировать результат</b>.<br/><br/>3. Feedback-loop. Как автоматический, когда QA-Gate забраковал задачу и отправил на доработку, так и <b>вручную дописанные от пользователя комментарии</b> по задаче.<br/><br/>4. Более частые, чем &quot;раз в никогда&quot; обновления <a href=\"https://github.com/ynulihao/AgentSkillOS\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">репозитория</a>.<br/><br/>5. Полноценную интеграцию с системами для AI-Coding (без траты &#036;10 на каждую более-менее серьёзную задачу).<br/><br/><b>Итог:</b> AgentSkillOS – отличный исследовательский проект, но сырой рабочий инструмент.<br/><br/>Если кто-то ещё успел попробовать, делитесь результатми своих тестов в комментариях. Очень интересно почитать <i class=\"emoji\"><b>😊</b></i>"}, {"id": "1229", "channel": "kdoronin_blog", "date": "2026-03-23T20:11:45+00:00", "views": "1.91K", "reactions": "22", "mediaUrl": "https://cdn4.telesco.pe/file/KDvv7Rz3Zd25AdFxEHKFXKwodMLEE2IGmdkm7Zck3XjThNFGyoF4R2-x9UlZCMFjHi4UIgZEiu31TQn97ToUzT5w2M1wKNRKPiZjuQGKtFLR4mWhqae4J1F4nIYVIOLs1mERtOHBR1-ej6nKEzpOtUI_MB0vMeAgMtJSvd_5ErSQfvahHQz2AOe0EqPy_N3uLDdz98mypApU2YV9Y2PqNb-FiPGsMvWoVn1kpGiHb6xptsIcqNmoaGizMwxlaPbN_YrQ2SQ-Phj4R-tCBULioAfV_lqoh7xEG-rZgk3GPrlwCjP-i6A0Nq5DF7zyxnsI9ptHZ40fPGup9l3F5KAyyw.jpg", "text": "<a href=\"https://mem0.ai/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\"><b>Mem0</b></a><b> и графовая память.</b><br/><br/>Mem0 специализируется, <b>в первую очередь, на векторной памяти</b> через Qdrant или аналогичные БД.<br/><br/>Графы использует, скорее, как <b>вспомогательную структуру для сохранения информации о связях</b> между конкретными сущностями.<br/><br/>Поэтому реализация графового модуля оказывается <b>значительно проще, чем в Graphiti или Hindsight</b> <tg-spoiler>(который, помимо прочего, также использует векторное хранилище)</tg-spoiler>.<br/><br/>Mem0 может при обработке нового события <b>просто удалить одну из существующих связей</b>. Тем самым <b>оставить узел без связей вообще</b>. <br/><br/>Самое неприятное – <b>он может это сделать по ошибке</b>.<br/><br/><b>Пример из трёх запросов (в качестве модели тут использовал qwen-3-235b-a22b-instruct-2507):</b><br/><br/>1. <b>&quot;Я живу в стране X&quot;</b> – сохраняет &quot;пользователь живёт в X&quot;. Где &quot;живёт&quot; – это ребро.<br/><br/>2. <b>&quot;Я живу в городе N&quot;</b> – сохраняет &quot;пользователь живёт в N&quot;. Создаёт новое ребро. <br/><br/>3. <b>&quot;До Y года я жил в M&quot;</b> – сохраняет &quot;пользователь живёт в M&quot;. <b>Удаляя при этом связи</b> с сущностями из п.1 и п.2. <br/><br/>В результате мы получаем <b>два важных узла, которые ни с чем не связаны</b>. И такой &quot;полностью отвязанный&quot; мусор в графе <b>будет постепенно накапливаться</b>. Только из-за того, что в ядре Mem0 AI-агенту <b>предоставляется возможность удалять рёбра</b>.<br/><br/><a href=\"https://github.com/getzep/graphiti\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Graphiti</a> в таких кейсах прекрасен. Даже если AI-агент что-то понял не так и записал информацию ошибочно, всегда можно сказать <b>&quot;Нет, ты не понял. На самом деле вот так&#33;&quot;</b>. Он <b>пометит предыдущее ребро, как невалидное</b> и будет учитывать этот факт при следующих запросах."}, {"id": "1230", "channel": "kdoronin_blog", "date": "2026-03-24T14:42:22+00:00", "views": "1.77K", "reactions": "25", "mediaUrl": "https://cdn4.telesco.pe/file/C5gpyE9cwo807BLREyyqccEOZyGW_mfp0SKNCEuvyjE6MKWg2YZKZvEfMx2fw9vf-QS9pf1yBtXx8piH6oY0-t8uecXI_em5C4F-1nOxFVy-Mvx7C3zpYukastaQDAoFBH82OW2h3WWMIZ6XRor_HvRhtLtca7BbYYDiwfgoR0oZdWj1PU0Gvosy5eLTZCAzFky1nmLAs55QxxwnR8Niyvvx78YRxmgTLLTUauOVmAjjKlzpYdal_SL6RpwAdpS0aPcRf7D7gPyfkK-3gtvk4LFI48XQ45-Q5t7LDJ3ifP-VADFJUyscuuTn1sIxbFJZgjqBajw8KgURJRV3o-zD-A.jpg", "text": "<b>Hindsight добавил плагин для Claude Code.</b><br/><br/>Он позволяет запускать Memory Bank <b>без внешних API-ключей</b>. Всё на базе подписки Anthropic с помощью Claude Code через установку плагина.<br/><br/>Фактически, в этом сетапе пользователь <b>не нарушает правил Anthropic</b>. Следовательно, бан за использование Claude Code &quot;не по назначению&quot; не грозит <tg-spoiler>(будет какой-нибудь другой <i class=\"emoji\"><b>😊</b></i>)</tg-spoiler>.<br/><br/>Инструкция по установке <a href=\"https://github.com/vectorize-io/hindsight/tree/main/hindsight-integrations/claude-code\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">тут</a>. Вариант без API-key – это <b>Option C</b>.<br/><br/>С первого раза Claude Code с <b>Opus 4.6 не справился с установкой</b>. Даже порывался сказать, что &quot;да оно так работать не будет&#33;&quot;.<br/><br/>После полного изучения репозитория Hindsight, AI-агент всё-таки нашёл <b>путь через установку hindsight-api</b>. <br/><br/>По итогу и Claude Code подключил, и UI дашборда для Hindsight.<br/><br/>Закину вам в комментарии дневник своего AI-агента Claude Code, чтобы он провёл вашего по пути успешной установки.<br/><br/>Таким образом, Claude Code + Hindsight становится <b>неплохим базовым сетапом для Second Brain</b>."}, {"id": "1231", "channel": "kdoronin_blog", "date": "2026-03-25T10:46:02+00:00", "views": "1.77K", "reactions": "32", "mediaUrl": "https://cdn4.telesco.pe/file/dPhAwK-7CPeBijFqC0b3cHeYQad9DtlQmS3t1rBOyUK_1Y7imlMOCUaNO_Z9rKOHHj57nGufr5EMNpZQmypQCl72AH6wi6xV3i4KH3e7Z2GidotSA0A08Hd8FAVSqo4aHehEwaCJK7Ym3ZDZ0Tz-o6bF7HuVcA4gi9zR--Ze8EICTd-msN1P6Miu3APp1An1hQsYiK8YFZH4UV4riRCZa3iRyaiS2-S_voLgFIaH3f_4ZDbMlsMehIUZlK8TPMCx5PycCipWfUiEgi7Ga_ti6ObkitZXgiW6iJOLPKg3ngL_Xrr67QY2QCRs80ZnliGHZZM2NE2R3JidLzxPB1z0cw.jpg", "text": "<b>И вот, когда уже написано десятки тысяч строк кода, появляется запрос:</b><br/><br/><blockquote>Окей, ChatGPT, сделай мне документацию по этому репозиторию</blockquote><br/><br/>Вот что бывает, когда не занимаешься документацией на протяжении всей жизни проекта.<br/><br/>Понятно, что промпт утрирован и для получения &quot;очень качественной документации&quot; будет описан с десяток критериев, которым <b>документация должна соответствовать</b>.<br/><br/>В итоге получим прекрасный документ <b>в стиле &quot;Что вижу – то пою&quot;</b>.<br/><br/>Только это <b>не совсем документация к проекту</b>. Там не будет ответа на ключевой вопрос:<br/><br/><blockquote>А зачем мы это всё создавали?</blockquote><br/><br/>Потому что код на этот вопрос может ответить далеко не всегда. Ибо является проекцией реального мира на логику, выраженную через язык программирования.<br/><br/>Более того, хороший код – это компактная и универсальная абстракция. А действительно сильную абстракцию не каждая нейронка разберёт.<br/><br/>Для полезной документации по проекту <b>необходим контекст реального мира</b>. Что именно мы проецировали в код.<br/><br/><b>Откуда можно получить этот контекст:</b><br/><br/>1. Правила при написании кода. Создавая новый модуль/класс/метод, описываем его смысл, следующий из бизнес-процессов. А не просто словами переписываем то, что и так выражено через код. То есть <b>комментарии в коде дополняют код, а не дублируют его</b>. Отвечаем на вопрос &quot;зачем?&quot;, а не &quot;что?&quot;.<br/><br/>2. Система контекста по проекту (буквально <a href=\"https://t.me/kdoronin_blog/1230\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">вчера писал</a> об одном из вариантов). Если разрабатываем код с помощью AI-coding, подключаем через хуки (важна детерменированность) слой знаний о проекте и храним его отдельно от кода. Как правило, при общении с AI-агентом, мы передаём тот недостающий <b>контекст, который важен для документации</b>. Плюс – получаем изменения бизнес-требований во времени. А эти изменения отлично накладываются на историю в git. Усилить контекст проекта можно, добавляя в систему результаты созвонов, переписок и комментариев в таск-трекере.<br/><br/>3. Если нет никаких артефактов по п.1 и п.2, не отчаиваемся. В промпт из начала статьи добавляем &quot;Проведи глубокое интервью с участниками процесса <tg-spoiler>(хорошо, когда не раздуваешь команду, правда?)</tg-spoiler>, чтобы изучить бизнес-процессы и меняющиеся обстоятельства, в которых создавали проект&quot;. И проходим это интервью.<br/><br/>Вариант №3, к сожалению, <b>оказывается самым хрупким</b>. Так как, отвечая на вопросы интервью, человек находится в моменте &quot;Сейчас&quot;. Следовательно, на его восприятие гораздо сильнее влияют те события, которые свежи в памяти, а не те, что были на старте проекта. <br/><br/>Тогда как именно мотивация на старте в том виде, в котором она преподносилась тогда, оказала <b>самое сильное влияние на то, каким мы видим проект сейчас</b>."}, {"id": "1232", "channel": "kdoronin_blog", "date": "2026-03-26T17:38:26+00:00", "views": "1.6K", "reactions": "44", "mediaUrl": "https://cdn4.telesco.pe/file/dE_GeGg30oY70eJkxgul6x8o3MPz5A0cGY058Y8g4Ca1QSyAnFyNXq_fkez0-Rc-WlDqzuob-yFAqihWeyXGCOIfWHF04IxIefaJI9a0xkMoLyBJChOjoY1kws8uWxLHLjxmzQafjbvwh9Azj6di8RUnWWw4qs69Txvg7GtmrvissR7S9Ma1cZD6VDy_gFB6vj010BNsc-N4Fhj819TtL8xDB2gMeGoLJDHrE4hUKsNYWtswaje2g6PhU20s4uz3L0JQiLAlvrHqfA9zhc1MFeg7KDFu_WN9ck2SvDKEGWodqNBBmJiJ4H-iSkfwj7HomD08xQUevKiYe4RrV86vsw.jpg", "text": "<b>Изучаем документацию фреймворка во время прогулки. Очередной мини-кейс использования </b><a href=\"https://notebooklm.google/\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">NotebookLM</a><b>. </b><br/><br/>1. Отправляем ссылку на <b>главную страницу документации</b> в ChatGPT и просим выгрузить списком все страницы документации, <b>сортируя их по степени важности</b> (самые важные в начале).<br/><br/>2. Берём список ссылок и отправляем их в качестве источников в NotebookLM. Если страниц больше 50, отсекаем нижние, так как они менее важны.<br/><br/>3. Заказываем подкаст с указанием, <b>какие конкретно аспекты из документации интересуют</b> больше всего.<br/><br/>Такой подход позволяет получить в режиме &quot;на ходу&quot; общее понимание о принципах работы фреймворка. А потом прояснять конкретные нюансы <b>через диалог с LLM и чтение документации</b>. <br/><br/><b>Ещё пара материалов</b>,<b> связанных с NotebookLM:</b><br/>1. <a href=\"https://t.me/kdoronin_blog/1175\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Большой архив с исследованиями про AI-агентов</a>.<br/>2. <a href=\"https://t.me/kdoronin_blog/1172\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Использование при анализе статей с arxiv.org</a>.<br/><br/>p.s.: Когда-то в этом канале в качестве медиа я вставлял фотографии, которые делал в течение дня. Решил на один день вернуть этот формат, так как удалось запечатлеть интересное погодное явление на фоне привычных эмиратских строек (бонус-видео – в комментариях)."}, {"id": "1233", "channel": "kdoronin_blog", "date": "2026-03-27T19:58:26+00:00", "views": "1.44K", "reactions": "60", "mediaUrl": "https://cdn4.telesco.pe/file/k6Q4MJEQEF-JhAJxi4NLWbU17fqoNtg8TzWOmCsC5yNc2c3iG0MkiK6mTH8GIty7kxbcC-Q-vtTSoQF1ObJMPHbNNKfY4e_YwHAsGmv8fmmxYP3wC8brU2rOsyAhzAPlaejZlZUUpRmsxBoAJ7nXfEC_L8PmFvLt7T2I1ClrA3YP0Urp4f2o1lIN9njJJEJd8KBcbWbnf8ifPSOlCvB45PcDdXiAID7M_D0M8pQqb_8bhVBoXj9f3mwH1pwnz-IFpCfxHmGEt8pTt3vOyMtc33-QZVdblwIg_7nqMgBugXd5UuVfSX0beg_5SKZlYs68BhUcoPJeU2gETTs-xMK9oQ.jpg", "text": "<a href=\"https://github.com/topoteretes/cognee\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Cognee</a> – движок знаний для AI-агентов. На замену <a href=\"https://github.com/mem0ai/mem0\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Mem0</a>.<br/><br/>Во первых строках моего письма, спешу вам сообщить, что их заявление про <b>&quot;Knowledge Engine for AI Agent Memory in 6 lines of code&quot;</b> – наглая ложь.<br/><br/>Первичная настройка и запуск в рамках <b>моего привычного тестового стенда</b> заняла больше времени, чем обычно <tg-spoiler>(с другими Knoledge Engine)</tg-spoiler>. Возможно, я делал что-то не так, но <b>с первичной настройкой Cognee пришлось повозиться</b>.<br/><br/>Первое впечатление фреймворк производит достаточно приятное. Есть понятно организованный пайплайн по хранению данных, который можно &quot;углублять&quot; <tg-spoiler>(кастомизировать)</tg-spoiler> на каждом из этапов.<br/><br/>Сам готовит любой загруженный документ (более 30 типов поддерживает) к загрузке в векторную БД. Потом из каждого чанка извлекает сущности, из <b>которых строит граф связей</b>. <br/><br/>Причём граф не &quot;для галочки&quot;, <a href=\"https://t.me/kdoronin_blog/1229\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">как в Mem0</a>, а в качестве <b>полноценного рабочего инструмента</b>. С возможностью автоматического объединения сущностей, проставления новых связей, а также, само собой, с привязкой фактов ко времени.<br/><br/>Есть режим, в котором LLM самостоятельно определяет режим поиска по данным. Правда, если это не SOTA-модель, лучше определять его самостоятельно. Так как AI-агента на on-prem-модели может увести не туда.<br/><br/>Пока не до конца понятен механизм того, как в режиме взаимодействия с Knowledge Engine сделать так, чтобы <b>без обновления документов</b> (вокруг которых в Cognee строится пайплайн) указать модели, что <b>какой-то факт или связь в Графе не являются истиной</b>. И чтобы после такого заявления он <b>случайно не удалил из графа лишнего</b>. <br/><br/><b>Итог:</b> первые тесты идут интересно. Продолжаю. Буду рассказывать о нюансах работы с Cognee в следующих материалах."}, {"id": "1234", "channel": "kdoronin_blog", "date": "2026-03-28T20:24:48+00:00", "views": "1.06K", "reactions": "21", "mediaUrl": "https://cdn4.telesco.pe/file/b53zjXHe8Qgzp3aAZvKbx7amTHi4BHBZFLHEyeDcWNnBvHpaT4CmmThj4MLmsLt9iX3LOkCujMa4zMPW0KF8xIYqh1fOLbdSTOJp2v01yls1k8J70wBeCz9eeN_U-a6HpQddx08WEC8vtc-ZNPaMn2rzrDLUKrJ9VtPRs75GwjB_jySHyosoJoJniPAYGjKdN_nB7vzTpGWPTwkSzizYLbmtRldhkkeMSBuYJaT5xgmIxKUqHPXxSSPa01tr3akKfl8i_DZnLFhcmmfGoegg3xA9Y3mF7VhgqFZpi0ImRcY-IrXGfYv3MX7GrR3JiWhA_VQytjfTFVrC0Xo44ULq9A.jpg", "text": "<b>Вредные советы от LLM или &quot;у вас vibe-coding прохудился&quot;.</b><br/><br/>В моём скромном <a href=\"https://github.com/kdoronin/video_analyzer\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">проекте для анализа видео с помощью мультимодальных моделей</a> есть отдельный модуль, позволяющий <b>получить список актуальных моделей из API</b> перед тем, как их отображать в интерфейсе. Это решение позволяет мне не обновлять проект каждый раз, когда Google или Openrouter выпускает/обновляет/переименовывает модели. <br/><br/>Сегодня был удивлён, когда в одном из проектов на 16 тысяч github-звёзд с 30+ интеграциями с разными LLM-провайдерами обнаружил список доступных моделей, <b>захардкоженный в виде массива строк</b>. И у значительной части этих провайдеров <b>в конфиге висели outdated-модели</b>, уже просто не доступные по API.<br/><br/><b>Вообще, AI-coding-агенты очень любят привносить в программы хрупкость, добавляя туда:</b><br/><br/>1. Массивы заранее захардкоженных строк, добавленных туда просто потому что &quot;AI-агент так решил&quot;, а пользователь так написал <tg-spoiler>(описав при этом далеко не все возможные случаи)</tg-spoiler>.<br/><br/>2. Поиск по вхождению захардкоженной строки. &quot;Чтобы определить, что пользователь задал вопрос, <b>поищем символ вопроса</b> в том, что он нам прислал&quot;.<br/><br/>3. Кастомный самописный regex-поиск. Похоже на п.2, но <b>отягощено регулярками</b>.<br/><br/>Ещё веселее, когда агенты пытаются использовать эти паттерны <b>при написании систем AI-агентов</b>. Так можно получить детерминированное поведение LLM совсем не там, где его ожидаете.<br/><br/><b>Выводы, которые можно сделать из озвученных особенностей:</b><br/>Если программа может взаимодействовать/интегрироваться с другими системами, позаботьтесь о том, <b>чтобы обновление внешней системы не требовало обязательного обновления вашей кодовой базы</b>. Потому что если таких систем будет 50 штук, все ваши обновления будут посвящены тушению пожаров.<br/><br/>А в пользовательскую инструкцию придётся добавить актуализированную фразу из старого анекдота, которую я вынес в медиа поста."}, {"id": "239", "channel": "nobilix", "date": "2026-03-26T07:24:57+00:00", "views": "3.46K", "reactions": "177", "text": "Самое продуктивное, что я сделал за последний год не имеет отношения к AI. И почему понимание не стоит делегировать.<br/><br/>За последнее время у меня было много ситуаций, когда 3-4 часа действительно сосредоточенной работы заменяли недели &quot;дефолтной&quot; работы (моей или чьей-то, не важно). Не потому что я работал быстрее, а потому что я нашел ресурс как следует вникнуть. Речь не только про AI-слоп, а про людей, команды, целые проекты. <i>Вникание</i> всегда работало, но с засильем AI стало каким-то волшебным зельем (которое все сложнее добывать).<br/><br/>Если говорить про нашу с вами работу головой - узкое горлышко не в скорости. А внимание и осознанность. Понимание того, что ты делаешь и зачем.<br/><br/>И именно это сейчас под ударом с двух сторон благодаря AI. Первая - внутренняя: думать энергозатратно, и мы механически, стараемся это делегировать (пусть агент сам решит, что ответить на письмо / отберет материал / примет архитектурное решение и т.д.). Вторая - внешняя: AI усиливает кризис внимания, ведь контента становится больше, attention span сжимается. И получается замкнутый круг: чем сложнее сосредоточиться, тем больше хочется делегировать, а чем больше делегируешь - тем меньше понимаешь.<br/><br/>А цена такого делегирования - <a href=\"https://simonw.substack.com/p/vibe-engineering\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">когнитивный долг</a> - ты просто потом переделываешь, потому что не можешь развивать то, чего не понимаешь.<br/><br/>А делать-то что?<br/><br/>1. Отвоевывай часы сосредоточенной работы (например <a href=\"https://t.me/nobilix/14\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">так</a>). Отвлечься просто, а войти в поток - нет.<br/>2. <a href=\"https://www.oneusefulthing.org/p/against-brain-damage\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Think first</a>. Еще до того как подключишь всезнайку (AI) - постарайся вытащить из себя и других людей как можно больше сути. Диктовка, разговор, доска - что угодно. AI потом усилит, но начальная мысль должна быть твоя.<br/>3. Цени свои оригинальные идеи. Записывай их. Сама в <a href=\"https://blog.samaltman.com/the-gentle-singularity\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">своем эссе</a> утверждает, что в будущем единственным ограничением останутся <i>действительно</i> хорошие идеи.<br/>4. Автоматизируй рутину, не мышление. Массовые, повторяющиеся, document-heavy операции - вот где AI дает кратный рост. Принятие решений - оставь себе.<br/>5. Инвестируй время в понимание предметной области, а не только инструментов. Чтобы лучше понять мир для которого ты строишь.<br/><br/>Заметьте, я говорю об этом не с позиции морали (правильно/не правильно). Это просто эффективнее. А еще это снижает тревогу: когда ты разобрался в том, что делаешь, ты спокойнее, ты владеешь этим. AI эту способность у вас не заберет. Просто не отдавайте ее сами.<br/><br/><i class=\"emoji\"><b>🔥</b></i> <i class=\"emoji\"><b>➕</b></i> <i class=\"emoji\"><b>🔁</b></i> <a href=\"https://t.me/nobilix\" target=\"_blank\">@nobilix</a>"}, {"id": "240", "channel": "nobilix", "date": "2026-03-28T16:31:32+00:00", "views": "1.79K", "reactions": "52", "text": "<a href=\"?q=%23ReDigest\">#ReDigest</a><br/><br/><a href=\"https://t.me/nobilix/238\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Продолжаем</a> субботнюю рубрику, тут я кратко рассказываю про новости из мира технологий и AI, которые привлекли мое внимание.<br/><br/><b>Дайджест недели:</b><br/><br/>- OpenAI <a href=\"https://techcrunch.com/2026/03/24/openais-sora-was-the-creepiest-app-on-your-phone-now-its-shutting-down/\" target=\"_blank\" rel=\"noopener\" onclick <script>
// ---- Utility ----
const NOW = new Date('2026-03-29T12:00:00+00:00');

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const diff = (NOW - d) / 1000;
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  const days = Math.floor(diff / 86400);
  if (days === 1) return '1d ago';
  return days + 'd ago';
}

function parseViews(v) {
  if (!v) return 0;
  const s = String(v).trim();
  if (s.endsWith('K')) return parseFloat(s) * 1000;
  if (s.endsWith('M')) return parseFloat(s) * 1000000;
  return parseInt(s) || 0;
}

function formatViews(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function sanitizeHTML(html) {
  // Strip tg-emoji wrappers and other heavy tags, keep allowed ones
  let s = html || '';
  // Remove <i class="emoji">...</i> wrappers but keep inner text
  s = s.replace(/<i class="emoji"[^>]*>(.*?)<\/i>/gi, '$1');
  // Remove <span class="tg-spoiler">
  s = s.replace(/<span[^>]*class="tg-spoiler"[^>]*>/gi, '');
  s = s.replace(/<\/span>/gi, '');
  // Strip onclick handlers from links
  s = s.replace(/\s+onclick="[^"]*"/gi, '');
  return s;
}

// Channel colors - deterministic from name
const CHANNEL_COLORS = {};
const PALETTE = ['#2AABEE','#e74c3c','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#3498db','#e91e63','#00bcd4','#ff5722','#8bc34a','#ff9800','#673ab7','#009688'];
Object.keys(DIGEST_DATA.channels).forEach((ch, i) => {
  CHANNEL_COLORS[ch] = PALETTE[i % PALETTE.length];
});

// ---- Tab switching ----
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'digest' && i === 0) || (tab === 'analytics' && i === 1));
  });
  document.getElementById('tab-digest').classList.toggle('active', tab === 'digest');
  document.getElementById('tab-analytics').classList.toggle('active', tab === 'analytics');
}

// ---- DIGEST TAB ----
let currentPeriod = 'all';
let currentChannel = null;

function initDigest() {
  // Period filters
  document.querySelectorAll('#period-filters .pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('#period-filters .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentPeriod = pill.dataset.period;
      renderFeed();
    });
  });

  // Channel filter pills
  const cf = document.getElementById('channel-filters');
  const allPill = document.createElement('span');
  allPill.className = 'pill active';
  allPill.textContent = 'All channels';
  allPill.dataset.channel = '';
  allPill.addEventListener('click', () => {
    document.querySelectorAll('#channel-filters .pill').forEach(p => p.classList.remove('active'));
    allPill.classList.add('active');
    currentChannel = null;
    renderFeed();
  });
  cf.appendChild(allPill);

  Object.entries(DIGEST_DATA.channels).forEach(([key, info]) => {
    const pill = document.createElement('span');
    pill.className = 'pill';
    pill.dataset.channel = key;
    pill.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + CHANNEL_COLORS[key] + ';margin-right:4px;vertical-align:middle"></span>' + '@' + key;
    pill.addEventListener('click', () => {
      document.querySelectorAll('#channel-filters .pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentChannel = key;
      renderFeed();
    });
    cf.appendChild(pill);
  });

  renderFeed();
}

function filterPosts() {
  let posts = [...DIGEST_DATA.posts];

  // Period filter
  if (currentPeriod !== 'all') {
    const cutoff = new Date(NOW);
    if (currentPeriod === 'today') cutoff.setDate(cutoff.getDate() - 1);
    else if (currentPeriod === '3d') cutoff.setDate(cutoff.getDate() - 3);
    else if (currentPeriod === 'week') cutoff.setDate(cutoff.getDate() - 7);
    posts = posts.filter(p => new Date(p.date) >= cutoff);
  }

  // Channel filter
  if (currentChannel) {
    posts = posts.filter(p => p.channel === currentChannel);
  }

  // Sort newest first
  posts.sort((a, b) => new Date(b.date) - new Date(a.date));
  return posts;
}

function renderFeed() {
  const posts = filterPosts();
  document.getElementById('feed-count').textContent = posts.length + ' posts';
  const feed = document.getElementById('feed');

  if (posts.length === 0) {
    feed.innerHTML = '<div class="loading">No posts match your filters</div>';
    return;
  }

  feed.innerHTML = posts.map((p, idx) => {
    const ch = DIGEST_DATA.channels[p.channel] || {};
    const color = CHANNEL_COLORS[p.channel] || '#2AABEE';
    const views = parseViews(p.views);
    const reactions = parseViews(p.reactions);
    const text = sanitizeHTML(p.text);
    const fwd = p.fwd_from ? '<div class="fwd-badge">Forwarded from ' + (p.fwd_link ? '<a href="' + p.fwd_link + '" target="_blank">' + p.fwd_from + '</a>' : p.fwd_from) + '</div>' : '';
    const media = p.mediaUrl ? '<img class="media-preview" src="' + p.mediaUrl + '" loading="lazy" alt="" onerror="this.style.display='none'">' : '';
    const link = 'https://t.me/' + p.channel + '/' + p.id;

    return '<div class="card">' +
      '<div class="card-header">' +
        '<span class="channel-dot" style="background:' + color + '"></span>' +
        '<span class="channel-name">@' + p.channel + '</span>' +
        '<span class="post-time">' + timeAgo(p.date) + '</span>' +
      '</div>' +
      fwd +
      '<div class="card-text" id="text-' + idx + '">' + text + '</div>' +
      '<div class="show-more" id="more-' + idx + '" onclick="toggleText(' + idx + ')">Show more</div>' +
      media +
      '<div class="card-footer">' +
        '<span class="stat-icon">&#128065; ' + formatViews(views) + '</span>' +
        '<span class="stat-icon">&#10084; ' + reactions + '</span>' +
        '<a href="' + link + '" target="_blank">Open &rarr;</a>' +
      '</div>' +
    '</div>';
  }).join('');

  // Check for overflow on text blocks
  requestAnimationFrame(() => {
    posts.forEach((p, idx) => {
      const el = document.getElementById('text-' + idx);
      const more = document.getElementById('more-' + idx);
      if (el && more && el.scrollHeight > 200) {
        more.style.display = 'block';
      }
    });
  });
}

function toggleText(idx) {
  const el = document.getElementById('text-' + idx);
  const more = document.getElementById('more-' + idx);
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    more.textContent = 'Show more';
  } else {
    el.classList.add('expanded');
    more.textContent = 'Show less';
  }
}

// ---- ANALYTICS TAB ----
function initAnalytics() {
  // Filter out "Channel created" post
  const posts = ANALYTICS_DATA.filter(p => p.views && p.views !== '');
  const totalPosts = posts.length;

  const reactions = posts.map(p => parseInt(p.reactions) || 0);
  const avgViews = Math.round(views.reduce((a, b) => a + b, 0) / views.length);
  const avgReactions = (reactions.reduce((a, b) => a + b, 0) / reactions.length).toFixed(1);
  const engRate = ((reactions.reduce((a, b) => a + b, 0) / views.reduce((a, b) => a + b, 0)) * 100).toFixed(1);

  // Metrics grid
  document.getElementById('metrics-grid').innerHTML =
    metric('18', 'Posts (since May 2025)') +
    metric('50', 'Subscribers') +

    metric(avgReactions, 'Avg Reactions') +
    metric(engRate + '%', 'Engagement Rate', true) +
    metric('11 mo', 'Channel Age');

  // Views trend sparkline
  const sortedPosts = [...posts].sort((a, b) => new Date(a.date) - new Date(b.date));
  const viewsArr = sortedPosts.map(p => parseInt(p.views) || 0);
  const maxView = Math.max(...viewsArr);

  document.getElementById('views-trend').innerHTML =
    '<div class="trend-header"><span class="trend-title">Views per post</span><span class="trend-direction down">299 -> 30 &#8595;</span></div>' +
    '<div class="sparkline">' + viewsArr.map(v => {
      const h = Math.max(4, (v / maxView) * 40);
      const c = v > 200 ? '#22c55e' : v > 100 ? '#eab308' : '#ef4444';
      return '<div class="spark-bar" style="height:' + h + 'px;background:' + c + '" title="' + v + ' views"></div>';
    }).join('') + '</div>';

  // Engagement trend
  const engArr = sortedPosts.map(p => {
    const v = parseInt(p.views) || 1;
    const r = parseInt(p.reactions) || 0;
    return (r / v * 100);
  });
  const maxEng = Math.max(...engArr);

  document.getElementById('engagement-trend').innerHTML =
    '<div class="trend-header"><span class="trend-title">Reactions / Views %</span><span class="trend-direction up">2% -> 30% &#8593;</span></div>' +
    '<div class="sparkline">' + engArr.map(e => {
      const h = Math.max(4, (e / maxEng) * 40);
      const c = e > 10 ? '#22c55e' : e > 5 ? '#eab308' : '#ef4444';
      return '<div class="spark-bar" style="height:' + h + 'px;background:' + c + '" title="' + e.toFixed(1) + '%"></div>';
    }).join('') + '</div>';

  // Top posts bar chart
  const byViews = [...posts].sort((a, b) => (parseInt(b.views) || 0) - (parseInt(a.views) || 0));
  const topMax = parseInt(byViews[0].views) || 1;

  document.getElementById('top-posts-chart').innerHTML = byViews.map(p => {
    const v = parseInt(p.views) || 0;
    const r = parseInt(p.reactions) || 0;
    const eng = v > 0 ? (r / v * 100) : 0;
    const w = (v / topMax * 100).toFixed(1);
    const color = eng > 15 ? '#22c55e' : eng > 5 ? '#eab308' : '#ef4444';
    // Extract first meaningful text

    const dateLabel = new Date(p.date).toLocaleDateString('ru-RU', { month: 'short', day: 'numeric' });
    return '<div class="bar-row">' +
      '<span class="bar-label" title="' + label.replace(/"/g, '') + '">' + dateLabel + '</span>' +
      '<div class="bar-wrap"><div class="bar-fill" style="width:' + w + '%;background:' + color + '"></div></div>' +
      '<span class="bar-value">' + v + ' views / ' + r + ' &#10084;</span>' +
    '</div>';
  }).join('');

  // Posting timeline
  const months = [
    { label: 'Jan 25', count: 0 },
    { label: 'Feb 25', count: 0 },
    { label: 'Mar 25', count: 0 },
    { label: 'Apr 25', count: 0 },
    { label: 'May 25', count: 1 },
    { label: 'Jun 25', count: 3 },
    { label: 'Jul 25', count: 2 },
    { label: 'Aug 25', count: 2 },
    { label: 'Sep 25', count: 2 },
    { label: 'Oct 25', count: 0 },
    { label: 'Nov 25', count: 0 },
    { label: 'Dec 25', count: 0 },
    { label: 'Jan 26', count: 0 },
    { label: 'Feb 26', count: 4 },
    { label: 'Mar 26', count: 4 },
  ];
  const maxMonth = Math.max(...months.map(m => m.count));

  document.getElementById('posting-timeline').innerHTML = months.map(m => {
    const dots = [];
    for (let i = 0; i < 5; i++) {
      dots.push('<div class="timeline-dot' + (i < m.count ? '' : ' empty') + '" style="' + (i < m.count ? 'opacity:' + (0.5 + 0.5 * (m.count / maxMonth)) : '') + '"></div>');
    }
    return '<div class="timeline-row">' +
      '<span class="timeline-month">' + m.label + '</span>' +
      '<div class="timeline-bar">' + dots.join('') + '</div>' +
      '<span class="timeline-count">' + (m.count || '-') + '</span>' +
    '</div>';
  }).join('') +
  '<div style="margin-top:10px;font-size:11px;color:#666;text-align:center">' +
    '<span style="color:#ef4444">&#9632;</span> Gap (Oct-Jan) - ' +
    '<span style="color:#22c55e">&#9632;</span> Active - ' +
    '<span style="color:#eab308">&#9632;</span> Resuming' +
  '</div>';

  // Recommendations
  const recs = [
    {
      tag: 'Consistency',
      title: 'Consistency is key',
      text: 'Big gaps kill momentum. The channel had 174-299 views in Jun-Sep 2025, but after a 5-month break views dropped to 88-120. Now even lower at 30-56. Regular posting (2-3x/week) is critical to rebuild.'
    },
    {
      tag: 'Content',
      title: 'Personal stories win',
      text: 'Top posts are opinionated takes ("Better a hole than an asshole" 299 views, "Khaltura" 290 views) vs informational posts. Keep the personal angle.'
    },
    {
      tag: 'Niche',
      title: 'AI + Sales niche works',
      text: '"ChatGPT zashyol v CRM" got 177 views with strong engagement. This intersection of AI and sales is unique - lean into it more.'
    },
    {

      title: 'Engagement is actually growing',
      text: 'Despite fewer views, reactions-per-view improved dramatically. Post #24 got 17 reactions on 56 views (30% rate!) vs post #5 with 5 reactions on 242 views (2%). The audience is more engaged - now need to grow it.'
    },
    {
      tag: 'Timing',
      title: 'Best posting time: 12:00-16:00 MSK',
      text: 'Most top posts were published in this window. Stick to it for maximum reach.'
    },
    {
      tag: 'Benchmark',
      title: 'Compared to AI channels in digest',
      text: 'Average AI channel post gets 3-5K views. With 50 subscribers, @drobot_dealflow is at early stage. Cross-posting insights to AI communities and collaborating with channels from the digest could accelerate growth.'
    }
  ];

  document.getElementById('recommendations').innerHTML = recs.map(r =>
    '<div class="insight">' +
      '<div class="tag">' + r.tag + '</div>' +
      '<h4>' + r.title + '</h4>' +
      '<p>' + r.text + '</p>' +
    '</div>'
  ).join('');
}

function metric(value, label, highlight) {
  return '<div class="metric-card' + (highlight ? ' highlight' : '') + '">' +
    '<div class="metric-value">' + value + '</div>' +
    '<div class="metric-label">' + label + '</div>' +
  '</div>';
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', () => {
  initDigest();
  initAnalytics();
});
</script>
</body>
</html>
