<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf8f5;--card:#fff;--ink:#1a1a1a;--muted:#6b6b6b;--line:#e8e4dd;--wine:#722F37;--wine-soft:#a8545e;--wine-pale:#d4b5bb;--pos:#2d7a3e;--neg:#c0392b;--accent:#c9a961}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px}
.wrap{max-width:1320px;margin:0 auto;padding:32px 24px 60px}
header{margin-bottom:24px}
.brand{font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:var(--wine);font-weight:600;margin-bottom:6px}
h1{font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.period{color:var(--muted);font-size:14px}
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:28px;flex-wrap:wrap}
.tab{padding:12px 20px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;letter-spacing:.01em}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--wine);border-bottom-color:var(--wine)}
.tab-content{display:none}
.tab-content.active{display:block}
section{margin-bottom:36px}
h2{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:600}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kpi{background:var(--card);border:1px solid var(--line);padding:18px;border-radius:8px}
.kpi-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:8px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi-unit{font-size:13px;color:var(--muted);font-weight:500;margin-left:3px}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}
.kpi-delta{font-size:12px;font-weight:600;margin-top:6px}
.pos{color:var(--pos)}.neg{color:var(--neg)}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px}
.row{display:grid;gap:16px}
.row-2{grid-template-columns:1.5fr 1fr}
.row-3{grid-template-columns:repeat(3,1fr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}
th.num,td.num{text-align:right}
td{padding:10px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;font-size:10px;border-radius:10px;font-weight:600;letter-spacing:.04em}
.badge-up{background:#e3f1e6;color:var(--pos)}
.badge-down{background:#f6e1de;color:var(--neg)}
.badge-new{background:#f5ecd0;color:#7a5c17}
.chart-wrap{position:relative;height:300px}
.chart-wrap-sm{position:relative;height:240px}
.callout{background:#fff8e7;border-left:3px solid var(--accent);padding:12px 16px;border-radius:4px;font-size:13px;color:#5a4a1a;margin-top:14px}
.callout strong{color:#3d2f08}
.note{font-size:12px;color:var(--muted);margin-top:10px;font-style:italic}
.line-bar{display:flex;align-items:center;gap:8px}
.line-bar-track{flex:1;height:7px;background:#f0ece6;border-radius:4px;overflow:hidden}
.line-bar-fill{height:100%;background:var(--wine);border-radius:4px}
.line-name{min-width:130px;font-weight:600}
@media(max-width:900px){.kpi-grid,.row-3,.row-2{grid-template-columns:1fr}}
</style>
</head>

const fmt = v => Math.round(v).toLocaleString('ru-RU');
const fmtK = v => (v>=1000000 ? (v/1000000).toFixed(1)+' млн' : (v/1000).toFixed(0)+' тыс');
const pct = (a,b) => b===0?null:((a/b-1)*100);
const signed = p => (p>=0?'+':'')+p.toFixed(1)+'%';

const STORE_LABELS = {all:'Все магазины',zavod:'Завод',novorossiysk:'Новороссийск',anapa:'Анапа',yarmarka:'Ярмарка'};
const STORE_NOTES = {
  all:'Сводка по всей сети: Завод, Новороссийск, Анапа, Ярмарка',
  zavod:'Флагманская точка при производстве. Основной объём выручки',
  novorossiysk:'Городская точка в Новороссийске. Активный рост в 2025',
  anapa:'Курортная точка в Анапе. Открыта в январе 2025',
  yarmarka:'Фестивальная/выставочная продажа. Сезонная, не постоянная'
};

let charts = [];

function render(storeKey) {
  const d = DATA[storeKey];
  charts.forEach(c => c.destroy());
  charts = [];
  const container = document.getElementById('dashboard');

  const yearly = d.yearly;
  const y2024 = yearly.find(y=>y.year===2024);
  const y2025 = yearly.find(y=>y.year===2025);
  const y2026 = yearly.find(y=>y.year===2026);

  const last = y2026 || y2025 || y2024;
  const prev = y2026 ? y2025 : (y2025 ? y2024 : null);

  // KPI: take 2025 full vs 2024 full + note partial 2026
  const mainYear = y2025 || y2024;
  const prevYear = y2025 ? y2024 : null;

  let kpiHtml = '<section><h2>Ключевые метрики · вино</h2><div class="kpi-grid">';
  if(mainYear){
    const revDelta = prevYear ? pct(mainYear.rev, prevYear.rev) : null;
    const botDelta = prevYear ? pct(mainYear.bot, prevYear.bot) : null;
    kpiHtml += `
      <div class="kpi"><div class="kpi-label">Выручка ${mainYear.year}</div><div class="kpi-value">${fmtK(mainYear.rev)}<span class="kpi-unit">₽</span></div>${revDelta!==null?`<div class="kpi-delta ${revDelta>=0?'pos':'neg'}">${signed(revDelta)} к ${prevYear.year}</div>`:'<div class="kpi-sub">нет данных за ' + (mainYear.year-1) + '</div>'}</div>
      <div class="kpi"><div class="kpi-label">Бутылок ${mainYear.year}</div><div class="kpi-value">${fmt(mainYear.bot)}<span class="kpi-unit">шт</span></div>${botDelta!==null?`<div class="kpi-delta ${botDelta>=0?'pos':'neg'}">${signed(botDelta)} к ${prevYear.year}</div>`:'<div class="kpi-sub">-</div>'}</div>
      <div class="kpi"><div class="kpi-label">Средняя цена ${mainYear.year}</div><div class="kpi-value">${fmt(mainYear.avg_price)}<span class="kpi-unit">₽/бут</span></div>${prevYear?`<div class="kpi-sub">было ${fmt(prevYear.avg_price)} ₽</div>`:''}</div>
      <div class="kpi"><div class="kpi-label">Скидки ${mainYear.year}</div><div class="kpi-value">${mainYear.disc_pct.toFixed(1)}<span class="kpi-unit">%</span></div><div class="kpi-sub">${fmtK(mainYear.disc_amt)} ₽ от прайса</div></div>`;
  }
  kpiHtml += '</div>';

  if(y2026){
    kpiHtml += `<div class="callout"><strong>Январь 2026 (01.01-25.01):</strong> ${fmtK(y2026.rev)} ₽ выручки, ${fmt(y2026.bot)} бут, средняя цена ${fmt(y2026.avg_price)} ₽, скидки ${y2026.disc_pct.toFixed(1)}%. Период неполный (25 дней из 31), прямое сравнение с январём 2025 некорректно.</div>`;
  }
  kpiHtml += `<div class="note">${STORE_NOTES[storeKey]}</div></section>`;

  // Yearly summary table
  let yearlyTable = '<section><h2>Годовые итоги · вино</h2><div class="card"><table><thead><tr><th>Год</th><th class="num">Выручка</th><th class="num">Бутылок</th><th class="num">Ср. цена</th><th class="num">Скидки %</th><th class="num">Скидки ₽</th><th class="num">YoY выручка</th></tr></thead><tbody>';
  yearly.forEach((y,i) => {
    const prev = yearly[i-1];
    let yoy = '-';
    if(prev && !(y.year===2026 && prev.year===2025)){
      const p = pct(y.rev, prev.rev);
      yoy = `<span class="badge ${p>=0?'badge-up':'badge-down'}">${signed(p)}</span>`;
    } else if(y.year===2026){
      yoy = '<span class="badge badge-new">25 дней</span>';
    }
    yearlyTable += `<tr><td><strong>${y.year}</strong>${y.year===2026?' (частично)':''}</td><td class="num">${fmt(y.rev)} ₽</td><td class="num">${fmt(y.bot)}</td><td class="num">${fmt(y.avg_price)} ₽</td><td class="num">${y.disc_pct.toFixed(1)}%</td><td class="num">${fmt(y.disc_amt)} ₽</td><td class="num">${yoy}</td></tr>`;
  });
  yearlyTable += '</tbody></table></div></section>';

  // Monthly chart
  let monthlyBlock = '<section><h2>Динамика по месяцам · вино</h2><div class="card"><div class="chart-wrap"><canvas id="chartMonthly"></canvas></div><div class="note">Тёмно-бордовый = 2024, красный = 2025, золотой = янв 2026 (частичный). Пустые месяцы = магазин не работал или не было продаж.</div></div></section>';

  // Lines by year
  const yearsWithLines = Object.keys(d.lines_by_year).sort();
  const lineNames = new Set();
  yearsWithLines.forEach(y => d.lines_by_year[y].forEach(l => lineNames.add(l.name)));
  const allLines = [...lineNames];
  // Sort by most recent year revenue
  const recentYear = yearsWithLines[yearsWithLines.length - 1];
  const recentMap = {};
  d.lines_by_year[recentYear].forEach(l => recentMap[l.name] = l.rev);
  allLines.sort((a,b) => (recentMap[b]||0) - (recentMap[a]||0));

  let linesTable = '<section><h2>Линейки вина по годам</h2><div class="row row-2"><div class="card"><table><thead><tr><th>Линейка</th>';
  yearsWithLines.forEach(y => linesTable += `<th class="num">${y}${y==='2026'?'*':''}</th>`);
  linesTable += '</tr></thead><tbody>';
  allLines.forEach(name => {
    linesTable += `<tr><td><strong>${name}</strong></td>`;
    yearsWithLines.forEach(y => {
      const item = d.lines_by_year[y].find(l => l.name === name);
      linesTable += `<td class="num">${item ? fmt(item.rev) + ' ₽' : '-'}</td>`;
    });
    linesTable += '</tr>';
  });
  linesTable += '</tbody></table></div><div class="card"><div class="chart-wrap-sm"><canvas id="chartLines"></canvas></div><div class="note">Сравнение ' + yearsWithLines.filter(y=>y!=='2026').join(' и ') + '</div></div></div></section>';

  // Top products
  let topTable = '<section><h2>Топ-15 позиций по выручке · весь период</h2><div class="card"><table><thead><tr><th>#</th><th>Позиция</th><th class="num">Бутылок</th><th class="num">Выручка</th><th class="num">Ср. цена</th></tr></thead><tbody>';
  d.top.forEach((p,i) => {
    topTable += `<tr><td style="color:var(--muted);font-weight:600">${i+1}</td><td>${p.name}</td><td class="num"><strong>${fmt(p.bot)}</strong></td><td class="num">${fmt(p.rev)} ₽</td><td class="num" style="color:var(--muted)">${fmt(p.rev/p.bot)} ₽</td></tr>`;
  });
  topTable += '</tbody></table></div></section>';

  // Attached
  const attYears = Object.keys(d.attached).sort();
  let attTable = '<section><h2>Привлечённая выручка (не вино)</h2><div class="card"><table><thead><tr><th>Категория</th>';
  attYears.forEach(y => attTable += `<th class="num">${y}${y==='2026'?'*':''}</th>`);
  attTable += '</tr></thead><tbody>';
  const attCats = new Set();
  attYears.forEach(y => d.attached[y].forEach(c => attCats.add(c.cat)));
  const attCatsSorted = [...attCats].sort((a,b) => {
    const av = d.attached[recentYear]?.find(c => c.cat===a)?.rev || 0;
    const bv = d.attached[recentYear]?.find(c => c.cat===b)?.rev || 0;
    return bv - av;
  });
  attCatsSorted.forEach(cat => {
    attTable += `<tr><td><strong>${cat}</strong></td>`;
    attYears.forEach(y => {
      const item = d.attached[y].find(c => c.cat===cat);
      attTable += `<td class="num">${item ? fmt(item.rev) + ' ₽' : '-'}</td>`;
    });
    attTable += '</tr>';
  });
  // Total
  attTable += '<tr style="background:#faf8f5;font-weight:700"><td>Итого</td>';
  attYears.forEach(y => {
    const total = d.attached[y].reduce((s,c) => s+c.rev, 0);
    attTable += `<td class="num">${fmt(total)} ₽</td>`;
  });
  attTable += '</tr></tbody></table></div></section>';

  container.innerHTML = kpiHtml + yearlyTable + monthlyBlock + linesTable + topTable + attTable;

  // Monthly chart
  const monthly = d.monthly;
  const colors = monthly.map(m => {
    if(m.ym.startsWith('2024')) return '#722F37';
    if(m.ym.startsWith('2025')) return '#a8545e';
    return '#c9a961';
  });
  charts.push(new Chart(document.getElementById('chartMonthly'), {
    type:'bar',
    data:{labels:monthly.map(m=>m.ym),datasets:[{label:'Выручка, ₽',data:monthly.map(m=>m.rev),backgroundColor:colors,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const m=monthly[c.dataIndex];return [fmt(c.parsed.y)+' ₽',fmt(m.bot)+' бут','скидки '+m.disc_pct.toFixed(1)+'%']}}}},scales:{y:{ticks:{callback:v=>(v>=1e6?(v/1e6).toFixed(1)+'М':(v/1000).toFixed(0)+'К')},grid:{color:'#f0ece6'}},x:{grid:{display:false},ticks:{maxRotation:60,minRotation:45,font:{size:10}}}}}
  }));

  // Lines chart - exclude 2026 for YoY comparison
  const yearsNoPartial = yearsWithLines.filter(y => y !== '2026');
  if(yearsNoPartial.length >= 1){
    const datasets = yearsNoPartial.map((y,i) => ({
      label: y,
      data: allLines.map(n => d.lines_by_year[y].find(l => l.name===n)?.rev || 0),
      backgroundColor: i===0 ? '#d4b5bb' : (i===1 ? '#722F37' : '#c9a961'),
      borderRadius:3
    }));
    charts.push(new Chart(document.getElementById('chartLines'),{
      type:'bar',
      data:{labels:allLines,datasets:datasets},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.parsed.x)+' ₽'}}},scales:{x:{ticks:{callback:v=>(v>=1e6?(v/1e6).toFixed(1)+'М':(v/1000).toFixed(0)+'К')},grid:{color:'#f0ece6'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
    }));
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.store);
  });
});

render('all');
</script>
