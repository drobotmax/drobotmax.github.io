<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тристория - Аналитика продаж</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf8f5;--card:#fff;--ink:#1a1a1a;--muted:#6b6b6b;--line:#e8e4dd;--wine:#722F37;--wine-soft:#a8545e;--wine-pale:#d4b5bb;--pos:#2d7a3e;--neg:#c0392b;--accent:#c9a961;--A:#2d7a3e;--B:#c9a961;--C:#a85151}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;font-size:14px}
.wrap{max-width:1400px;margin:0 auto;padding:28px 20px 60px}
header{margin-bottom:20px;border-bottom:1px solid var(--line);padding-bottom:14px}
.brand{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--wine);font-weight:700;margin-bottom:4px}
h1{font-size:26px;font-weight:700;letter-spacing:-.02em;margin-bottom:3px}
.period{color:var(--muted);font-size:13px}
.nav{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:24px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:10;padding-top:4px}
.nav-btn{padding:10px 16px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;letter-spacing:.01em;white-space:nowrap}
.nav-btn:hover{color:var(--ink)}
.nav-btn.active{color:var(--wine);border-bottom-color:var(--wine)}
.section-group{margin-top:8px;padding-top:4px;border-top:1px dashed var(--line)}
section{margin-bottom:28px}
h2{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;font-weight:700}
h3{font-size:14px;font-weight:700;margin-bottom:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.kpi{background:var(--card);border:1px solid var(--line);padding:14px 16px;border-radius:8px}
.kpi-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.05}
.kpi-unit{font-size:11px;color:var(--muted);font-weight:500;margin-left:2px}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-delta{font-size:11px;font-weight:700;margin-top:4px}
.pos{color:var(--pos)}.neg{color:var(--neg)}.mtd{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px}
.row{display:grid;gap:14px}
.row-2{grid-template-columns:1fr 1fr}
.row-21{grid-template-columns:2fr 1fr}
.row-3{grid-template-columns:repeat(3,1fr)}
.row-4{grid-template-columns:repeat(4,1fr)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;padding:7px 9px;font-weight:700;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--line);cursor:pointer;user-select:none}
th.num,td.num{text-align:right}
th.sortable:hover{color:var(--wine)}
td{padding:7px 9px;border-bottom:1px solid var(--line)}
tr:hover td{background:#faf6ef}
tr.sep td{border-top:2px solid var(--ink);font-weight:700;background:#f5f1ea}
.badge{display:inline-block;padding:1px 6px;font-size:10px;border-radius:8px;font-weight:700;letter-spacing:.04em}
.badge-A{background:#e3f1e6;color:var(--A)}
.badge-B{background:#fbf3dc;color:#7a5c17}
.badge-C{background:#f6e1de;color:var(--C)}
.badge-X{background:#e8f4e8;color:#2d5f2d}
.badge-Y{background:#fff1d9;color:#7a5a17}
.badge-Z{background:#fbe2da;color:#8a3020}
.badge-up{background:#e3f1e6;color:var(--pos)}
.badge-down{background:#f6e1de;color:var(--neg)}
.badge-new{background:#f5ecd0;color:#7a5c17}
.chart-wrap{position:relative;height:280px}
.chart-wrap-sm{position:relative;height:220px}
.chart-wrap-lg{position:relative;height:340px}
.note{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic}
.callout{background:#fff8e7;border-left:3px solid var(--accent);padding:10px 14px;border-radius:4px;font-size:12.5px;color:#5a4a1a;margin-top:10px}
.callout strong{color:#3d2f08}
.matrix{display:grid;grid-template-columns:60px repeat(3,1fr);gap:0;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.mcell{padding:12px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);font-size:12px}
.mcell:nth-child(4n){border-right:none}
.mhead{background:#f5f1ea;font-weight:700;text-align:center}
.mcell h4{font-size:15px;font-weight:700;margin-bottom:4px}
.mcell .m-count{font-size:11px;color:var(--muted);margin-bottom:6px}
.mcell .m-rev{font-weight:700;margin-bottom:4px}
.mcell .m-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.m-AX{background:#e8f5e9}
.m-AY{background:#f4f1e4}
.m-AZ{background:#fbe7df}
.m-BX{background:#edf2ed}
.m-BY{background:#f8f6ee}
.m-BZ{background:#f9ebe4}
.heatmap{display:grid;grid-template-columns:80px repeat(12,1fr);gap:2px}
.hcell{padding:6px 4px;text-align:center;font-size:11px;border-radius:3px;background:#f0ece6}
.hhead{font-weight:700;background:#f5f1ea;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.hyear{font-weight:700;background:#f5f1ea;color:var(--ink)}
.filter-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-input{padding:6px 10px;border:1px solid var(--line);border-radius:4px;font-family:inherit;font-size:12px;flex:1;min-width:200px}
.filter-btn{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted)}
.filter-btn.active{background:var(--wine);color:#fff;border-color:var(--wine)}
.pill{display:inline-block;padding:1px 6px;font-size:9px;border-radius:8px;background:#f0ece6;color:var(--muted);margin-left:4px;font-weight:600}
@media(max-width:960px){.kpi-grid,.row-2,.row-21,.row-3,.row-4,.kpi-grid-6{grid-template-columns:1fr 1fr}.heatmap{grid-template-columns:60px repeat(6,1fr)}}
</style>
</head>

const fmt = v => Math.round(v).toLocaleString('ru-RU');
const fmtK = v => v>=1e6 ? (v/1e6).toFixed(2)+' млн' : (v/1e3).toFixed(0)+' тыс';
const pct = (a,b) => b===0?null:((a/b-1)*100);
const signed = p => p===null ? '-' : (p>=0?'+':'')+p.toFixed(1)+'%';
const badgeDelta = p => p===null ? '-' : `<span class="badge ${p>=0?'badge-up':'badge-down'}">${signed(p)}</span>`;

let charts = [];
function clearCharts(){charts.forEach(c=>c.destroy());charts=[]}

const MONTH_LABELS = {'01':'Янв','02':'Фев','03':'Мар','04':'Апр','05':'Май','06':'Июн','07':'Июл','08':'Авг','09':'Сен','10':'Окт','11':'Ноя','12':'Дек'};

function heatColor(v, max){
  if(!v || !max) return '#f0ece6';
  const t = v/max;
  const r = Math.round(247 - t*(247-114));
  const g = Math.round(245 - t*(245-47));
  const b = Math.round(238 - t*(238-55));
  return `rgb(${r},${g},${b})`;
}

VIEWS.discounts = () => {
  let html = `<section><h2>Динамика скидок по месяцам</h2><div class="card"><div class="chart-wrap"><canvas id="c_disc_monthly"></canvas></div><div class="note">Серые столбцы - %% скидки к месяцу. Линия - сумма скидок в ₽.</div></div></section>`;

  html += `<section><h2>Скидки по линейкам и годам</h2><div class="card"><table><thead><tr><th>Линейка</th><th class="num">2024 %</th><th class="num">2024 ₽</th><th class="num">2025 %</th><th class="num">2025 ₽</th><th class="num">Δ п.п.</th></tr></thead><tbody>`;
  const lines = new Set();
  ['2024','2025'].forEach(y => (DATA.disc_by_line[y]||[]).forEach(l => lines.add(l.line)));
  const arr = [];
  for(const l of lines){
    const r24 = (DATA.disc_by_line['2024']||[]).find(x=>x.line===l);
    const r25 = (DATA.disc_by_line['2025']||[]).find(x=>x.line===l);
    arr.push({line:l,pct24:r24?.disc_pct||0,amt24:r24?.disc_amt||0,pct25:r25?.disc_pct||0,amt25:r25?.disc_amt||0,delta:(r25?.disc_pct||0)-(r24?.disc_pct||0)});
  }
  arr.sort((a,b) => b.amt25 - a.amt25);
  for(const r of arr){
    html += `<tr><td><strong>${r.line}</strong></td><td class="num">${r.pct24.toFixed(1)}%</td><td class="num">${fmt(r.amt24)} ₽</td><td class="num"><strong>${r.pct25.toFixed(1)}%</strong></td><td class="num">${fmt(r.amt25)} ₽</td><td class="num"><span class="badge ${r.delta>0?'badge-down':'badge-up'}">${r.delta>0?'+':''}${r.delta.toFixed(1)}</span></td></tr>`;
  }
  html += `</tbody></table></div>
    <div class="callout"><strong>Вывод:</strong> скидка выросла почти по всем линейкам. Самые большие приросты - там, где пытались "раскачать" продажи. Но, как видно из ABC-анализа, падение объёма не связано напрямую со скидками - а значит дисконт съел маржу впустую.</div>
  </section>`;
  return html;
};

VIEWS.lines = () => {
  const lc = DATA.line_compare;
  let html = `<section><h2>Линейки: выручка и бутылки по годам</h2><div class="card"><table><thead><tr><th>Линейка</th><th class="num">2024 ₽</th><th class="num">2025 ₽</th><th class="num">YoY выр</th><th class="num">янв 2026 ₽</th><th class="num">2024 бут</th><th class="num">2025 бут</th><th class="num">YoY бут</th></tr></thead><tbody>`;
  lc.forEach(r => {
    const yoyRev = r['2024_rev'] ? pct(r['2025_rev'], r['2024_rev']) : null;
    const yoyBot = r['2024_bot'] ? pct(r['2025_bot'], r['2024_bot']) : null;
    const isNew = r['2024_rev']===0 && r['2025_rev']>0;
    html += `<tr>
      <td><strong>${r.line}</strong>${isNew?' <span class="badge badge-new">NEW</span>':''}</td>
      <td class="num">${r['2024_rev']?fmt(r['2024_rev'])+' ₽':'-'}</td>
      <td class="num">${r['2025_rev']?fmt(r['2025_rev'])+' ₽':'-'}</td>
      <td class="num">${badgeDelta(yoyRev)}</td>
      <td class="num">${r['2026_rev']?fmt(r['2026_rev'])+' ₽':'-'}</td>
      <td class="num">${r['2024_bot']?fmt(r['2024_bot']):'-'}</td>
      <td class="num">${r['2025_bot']?fmt(r['2025_bot']):'-'}</td>
      <td class="num">${badgeDelta(yoyBot)}</td>
    </tr>`;
  });
  html += `</tbody></table></div></section>`;

  html += `<section><h2>Визуальное сравнение линеек · 2024 vs 2025</h2><div class="card"><div class="chart-wrap-lg"><canvas id="c_lines_compare"></canvas></div></div></section>`;
  return html;
};

function renderStore(storeKey){
  const s = DATA.stores[storeKey];
  const name = {all:'Все магазины',zavod:'Завод',novorossiysk:'Новороссийск',anapa:'Анапа',yarmarka:'Ярмарка'}[storeKey];
  const y24 = s.yearly.find(y=>y.year==='2024');
  const y25 = s.yearly.find(y=>y.year==='2025');
  const y26 = s.yearly.find(y=>y.year==='2026');

  let html = `<section><h2>${name} · детализация</h2>
    <div class="kpi-grid-6">`;
  const main = y25 || y24;
  const prev = y25 ? y24 : null;
  if(main){
    html += `<div class="kpi"><div class="kpi-label">Выручка ${main.year}</div><div class="kpi-value">${fmtK(main.rev)}<span class="kpi-unit">₽</span></div>${prev?`<div class="kpi-delta ${main.rev>=prev.rev?'pos':'neg'}">${signed(pct(main.rev,prev.rev))}</div>`:'<div class="kpi-sub">-</div>'}</div>
    <div class="kpi"><div class="kpi-label">Бутылок ${main.year}</div><div class="kpi-value">${fmt(main.bot)}</div>${prev?`<div class="kpi-delta ${main.bot>=prev.bot?'pos':'neg'}">${signed(pct(main.bot,prev.bot))}</div>`:'<div class="kpi-sub">-</div>'}</div>
    <div class="kpi"><div class="kpi-label">Ср. цена</div><div class="kpi-value">${fmt(main.avg_price)}<span class="kpi-unit">₽</span></div>${prev?`<div class="kpi-sub">было ${fmt(prev.avg_price)} ₽</div>`:''}</div>
    <div class="kpi"><div class="kpi-label">Скидки</div><div class="kpi-value">${main.disc_pct.toFixed(1)}<span class="kpi-unit">%</span></div>${prev?`<div class="kpi-sub">было ${prev.disc_pct.toFixed(1)}%</div>`:''}</div>
    <div class="kpi"><div class="kpi-label">Дней работы</div><div class="kpi-value">${main.orders}</div>${prev?`<div class="kpi-sub">было ${prev.orders}</div>`:''}</div>
    <div class="kpi"><div class="kpi-label">Бут/день</div><div class="kpi-value">${main.bot_per_order.toFixed(1)}</div>${prev?`<div class="kpi-delta ${main.bot_per_order>=prev.bot_per_order?'pos':'neg'}">${signed(pct(main.bot_per_order,prev.bot_per_order))}</div>`:''}</div>`;
  }
  html += `</div>`;
  if(y26) html += `<div class="callout"><strong>Январь 2026 (25 дней):</strong> ${fmtK(y26.rev)} ₽ · ${fmt(y26.bot)} бут · ${fmt(y26.avg_price)} ₽/бут · ${y26.disc_pct.toFixed(1)}% скидки · ${y26.bot_per_order.toFixed(1)} бут/день. Частичный период.</div>`;
  html += `</section>`;

  // Yearly table
  html += `<section><h2>Годовые итоги</h2><div class="card"><table><thead><tr><th>Год</th><th class="num">Выручка</th><th class="num">Бут</th><th class="num">Ср.цена</th><th class="num">Скидки</th><th class="num">Дней</th><th class="num">Бут/день</th><th class="num">₽/день</th></tr></thead><tbody>`;
  s.yearly.forEach(y => {
    html += `<tr><td><strong>${y.year}</strong>${y.year==='2026'?' (25 дн)':''}</td><td class="num">${fmt(y.rev)} ₽</td><td class="num">${fmt(y.bot)}</td><td class="num">${fmt(y.avg_price)} ₽</td><td class="num">${y.disc_pct.toFixed(1)}%</td><td class="num">${y.orders}</td><td class="num">${y.bot_per_order.toFixed(1)}</td><td class="num">${fmt(y.avg_check)} ₽</td></tr>`;
  });
  html += `</tbody></table></div></section>`;

  // Monthly detailed table
  html += `<section><h2>Ежемесячная детализация</h2><div class="card" style="overflow-x:auto"><table><thead><tr><th>Месяц</th><th class="num">Выручка</th><th class="num">Бут</th><th class="num">Ср.цена</th><th class="num">Скидки</th><th class="num">Дней</th><th class="num">Бут/день</th></tr></thead><tbody>`;
  s.monthly.forEach(m => {
    html += `<tr><td>${m.YM}</td><td class="num">${fmt(m.rev)} ₽</td><td class="num">${fmt(m.bot)}</td><td class="num">${fmt(m.avg_price)} ₽</td><td class="num">${m.disc_pct.toFixed(1)}%</td><td class="num">${m.orders}</td><td class="num">${m.bot_per_order.toFixed(1)}</td></tr>`;
  });
  html += `</tbody></table></div></section>`;

  // Lines by year
  const years = Object.keys(s.lines).sort();
  const lineSet = new Set();
  years.forEach(y => s.lines[y].forEach(l => lineSet.add(l.name)));
  html += `<section><h2>Линейки по годам</h2><div class="card"><table><thead><tr><th>Линейка</th>`;
  years.forEach(y => html += `<th class="num">${y} ₽</th><th class="num">${y} бут</th><th class="num">${y} ср.цена</th>`);
  html += `</tr></thead><tbody>`;
  const linesArr = [...lineSet];
  linesArr.sort((a,b) => {
    const ay = s.lines[years[years.length-1]].find(l=>l.name===a)?.rev || 0;
    const by = s.lines[years[years.length-1]].find(l=>l.name===b)?.rev || 0;
    return by-ay;
  });
  linesArr.forEach(n => {
    html += `<tr><td><strong>${n}</strong></td>`;
    years.forEach(y => {
      const it = s.lines[y].find(l => l.name===n);
      html += `<td class="num">${it?fmt(it.rev)+' ₽':'-'}</td><td class="num">${it?fmt(it.bot):'-'}</td><td class="num">${it?fmt(it.avg)+' ₽':'-'}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div></section>`;

  // Top SKUs
  html += `<section><h2>Топ-20 SKU (весь период)</h2><div class="card"><table><thead><tr><th>#</th><th>Позиция</th><th class="num">Бут</th><th class="num">Выручка</th><th class="num">Ср.цена</th></tr></thead><tbody>`;
  s.top.forEach((p,i) => {
    html += `<tr><td style="color:var(--muted);font-weight:700">${i+1}</td><td>${p.name}</td><td class="num">${fmt(p.bot)}</td><td class="num">${fmt(p.rev)} ₽</td><td class="num" style="color:var(--muted)">${fmt(p.avg)} ₽</td></tr>`;
  });
  html += `</tbody></table></div></section>`;

  // Attached
  const attYears = Object.keys(s.attached).sort();
  if(attYears.length){
    html += `<section><h2>Привлечённая выручка (не вино)</h2><div class="card"><table><thead><tr><th>Категория</th>`;
    attYears.forEach(y => html += `<th class="num">${y}</th>`);
    html += `</tr></thead><tbody>`;
    const cats = new Set();
    attYears.forEach(y => s.attached[y].forEach(c => cats.add(c.cat)));
    [...cats].forEach(c => {
      html += `<tr><td><strong>${c}</strong></td>`;
      attYears.forEach(y => {
        const r = s.attached[y].find(x => x.cat===c);
        html += `<td class="num">${r?fmt(r.rev)+' ₽':'-'}</td>`;
      });
      html += `</tr>`;
    });
    html += `<tr class="sep"><td>Итого</td>`;
    attYears.forEach(y => {
      const sum = s.attached[y].reduce((a,b)=>a+b.rev,0);
      html += `<td class="num">${fmt(sum)} ₽</td>`;
    });
    html += `</tr>`;
    html += `</tbody></table></div></section>`;
  }

  // Chart
  html += `<section><h2>Графики</h2><div class="row row-2"><div class="card"><h3>Выручка по месяцам</h3><div class="chart-wrap"><canvas id="c_store_monthly"></canvas></div></div><div class="card"><h3>Линейки ${years[years.length-1]}</h3><div class="chart-wrap"><canvas id="c_store_lines"></canvas></div></div></div></section>`;

  return html;
}

// ========== CHART RENDERERS (after DOM) ==========
function renderCharts(view){
  clearCharts();
  if(view === 'overview'){
    const m = DATA.stores.all.monthly;
    const colors = m.map(r => r.YM.startsWith('2024') ? '#722F37' : r.YM.startsWith('2025') ? '#a8545e' : '#c9a961');
    charts.push(new Chart(document.getElementById('c_overview_monthly'), {
      type:'bar',
      data:{labels:m.map(r=>r.YM),datasets:[{data:m.map(r=>r.rev),backgroundColor:colors,borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const r=m[c.dataIndex];return [fmt(c.parsed.y)+' ₽',fmt(r.bot)+' бут','скидки '+r.disc_pct.toFixed(1)+'%']}}}},scales:{y:{ticks:{callback:v=>v>=1e6?(v/1e6).toFixed(1)+'М':(v/1000).toFixed(0)+'К'},grid:{color:'#f0ece6'}},x:{grid:{display:false},ticks:{maxRotation:60,minRotation:45,font:{size:10}}}}}
    }));
  }
  if(view === 'abc'){
    // Lorenz curve
    const items = DATA.abc_items;
    const labels = items.map((_,i)=>((i+1)/items.length*100).toFixed(0));
    const cum = items.map(x=>x.cum);
    charts.push(new Chart(document.getElementById('c_abc_lorenz'),{
      type:'line',
      data:{labels:labels,datasets:[{label:'Накопл. выручка %',data:cum,borderColor:'#722F37',backgroundColor:'rgba(114,47,55,0.1)',fill:true,tension:0.1,pointRadius:0},{label:'Идеальное распределение',data:labels.map(l=>+l),borderColor:'#c9a961',borderDash:[5,5],pointRadius:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'},title:{display:true,text:'Накопл. выручка, %'}},x:{title:{display:true,text:'SKU (накопленный %)'}}}}
    }));
    renderAbcTable();
    document.querySelectorAll('[data-abc]').forEach(b => b.addEventListener('click', e => {
      document.querySelectorAll('[data-abc]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderAbcTable(b.dataset.abc);
    }));
    document.getElementById('abc_search').addEventListener('input', () => renderAbcTable(document.querySelector('[data-abc].active').dataset.abc));
  }
  if(view === 'season'){
    const byM = {};
    DATA.season.filter(d=>d.y<'2026').forEach(d => {
      if(!byM[d.m]) byM[d.m] = [];
      byM[d.m].push(d.rev);
    });
    const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
    const avg = months.map(m => byM[m]? byM[m].reduce((a,b)=>a+b,0)/byM[m].length : 0);
    charts.push(new Chart(document.getElementById('c_season_profile'), {
      type:'line',
      data:{labels:months.map(m=>MONTH_LABELS[m]),datasets:[{label:'Средняя выручка',data:avg,borderColor:'#722F37',backgroundColor:'rgba(114,47,55,0.15)',fill:true,tension:0.3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>(v/1e6).toFixed(1)+'М'}}}}
    }));
  }
  if(view === 'discounts'){
    const dm = DATA.disc_monthly;
    charts.push(new Chart(document.getElementById('c_disc_monthly'), {
      data:{labels:dm.map(r=>r.ym),datasets:[{type:'bar',label:'Скидки %',data:dm.map(r=>r.disc_pct),backgroundColor:'#d4b5bb',yAxisID:'y'},{type:'line',label:'Сумма скидок ₽',data:dm.map(r=>r.disc_amt),borderColor:'#722F37',tension:0.2,yAxisID:'y1'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>v+'%'},position:'left'},y1:{ticks:{callback:v=>(v/1000).toFixed(0)+'К'},position:'right',grid:{display:false}},x:{ticks:{maxRotation:60,minRotation:45,font:{size:10}}}}}
    }));
  }
  if(view === 'lines'){
    const lc = DATA.line_compare;
    charts.push(new Chart(document.getElementById('c_lines_compare'),{
      type:'bar',
      data:{labels:lc.map(r=>r.line),datasets:[{label:'2024',data:lc.map(r=>r['2024_rev']),backgroundColor:'#d4b5bb'},{label:'2025',data:lc.map(r=>r['2025_rev']),backgroundColor:'#722F37'}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}},scales:{x:{ticks:{callback:v=>(v/1e6).toFixed(1)+'М'}}}}
    }));
  }
  if(view === 'catalog'){
    renderCatalogTable();
    document.getElementById('cat_search').addEventListener('input', renderCatalogTable);
    document.querySelectorAll('#tbl_catalog .sortable').forEach(th => th.addEventListener('click', () => {
      catalogSort = th.dataset.sort;
      catalogDesc = catalogSort===catalogLast ? !catalogDesc : true;
      catalogLast = catalogSort;
      renderCatalogTable();
    }));
  }
  if(view.startsWith('store_')){
    const k = view.replace('store_','');
    const s = DATA.stores[k];
    const m = s.monthly;
    charts.push(new Chart(document.getElementById('c_store_monthly'),{
      type:'bar',
      data:{labels:m.map(r=>r.YM),datasets:[{data:m.map(r=>r.rev),backgroundColor:m.map(r=>r.YM.startsWith('2024')?'#722F37':r.YM.startsWith('2025')?'#a8545e':'#c9a961'),borderRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v>=1e6?(v/1e6).toFixed(1)+'М':(v/1000).toFixed(0)+'К'}},x:{ticks:{maxRotation:60,minRotation:45,font:{size:9}}}}}
    }));
    const years = Object.keys(s.lines).sort();
    const lastY = years[years.length-1];
    const ld = s.lines[lastY];
    if(ld.length) charts.push(new Chart(document.getElementById('c_store_lines'),{
      type:'bar',
      data:{labels:ld.map(l=>l.name),datasets:[{data:ld.map(l=>l.rev),backgroundColor:'#722F37',borderRadius:3}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>v>=1e6?(v/1e6).toFixed(1)+'М':(v/1000).toFixed(0)+'К'}}}}
    }));
  }
}

function renderAbcTable(cls = 'all'){
  const q = (document.getElementById('abc_search')?.value||'').toLowerCase();
  const tbody = document.querySelector('#tbl_abc tbody');
  const items = DATA.abc_items.filter(i => (cls==='all'||i.abc===cls) && (!q||i.sku.toLowerCase().includes(q)||(i.line||'').toLowerCase().includes(q)));
  tbody.innerHTML = items.map((i,n) => `<tr><td style="color:var(--muted)">${n+1}</td><td>${i.sku}</td><td>${i.line||'-'}</td><td class="num">${fmt(i.rev)} ₽</td><td class="num">${fmt(i.bot)}</td><td class="num">${i.share.toFixed(2)}%</td><td class="num">${i.cum.toFixed(1)}%</td><td class="num"><span class="badge badge-${i.abc}">${i.abc}</span></td><td class="num">${i.xyz!=='-'?`<span class="badge badge-${i.xyz}">${i.xyz}</span>`:'-'}</td></tr>`).join('');
}

let catalogSort = 'rev', catalogDesc = true, catalogLast = 'rev';
function renderCatalogTable(){
  const q = (document.getElementById('cat_search')?.value||'').toLowerCase();
  let items = DATA.abc_items.filter(i => !q || i.sku.toLowerCase().includes(q) || (i.line||'').toLowerCase().includes(q));
  items.sort((a,b) => {
    let av = a[catalogSort], bv = b[catalogSort];
    if(typeof av==='string') return catalogDesc ? bv.localeCompare(av) : av.localeCompare(bv);
    return catalogDesc ? (bv||0)-(av||0) : (av||0)-(bv||0);
  });
  const tbody = document.querySelector('#tbl_catalog tbody');
  tbody.innerHTML = items.map(i => `<tr><td>${i.sku}</td><td>${i.line||'-'}</td><td class="num">${fmt(i.rev)} ₽</td><td class="num">${fmt(i.bot)}</td><td class="num">${i.share.toFixed(2)}%</td><td class="num"><span class="badge badge-${i.abc}">${i.abc}</span></td><td class="num">${i.xyz!=='-'?`<span class="badge badge-${i.xyz}">${i.xyz}</span>`:'-'}</td><td class="num">${i.cv?i.cv.toFixed(0)+'%':'-'}</td></tr>`).join('');
}

function render(view){
  const content = document.getElementById('content');
  if(view.startsWith('store_')){
    content.innerHTML = renderStore(view.replace('store_',''));
  } else if (VIEWS[view]){
    content.innerHTML = VIEWS[view]();
  }
  renderCharts(view);
}

document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(btn.dataset.view);
  window.scrollTo({top:0,behavior:'smooth'});
}));

render('overview');
</script>
